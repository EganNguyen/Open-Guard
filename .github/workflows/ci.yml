name: Production CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # 0. DETECT CHANGES
  # ─────────────────────────────────────────
  detect-changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set.outputs.modules }}
      infra_changed: ${{ steps.set.outputs.infra_changed }}
      go_changed: ${{ steps.set.outputs.go_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            changed=$(git diff --name-only HEAD~1...HEAD || true)
          fi

          modules=()
          infra_changed="false"
          go_changed="false"
          run_all_go="false"

          for file in $changed; do
            case $file in
              sdk/*) modules+=("sdk"); go_changed="true" ;;
              shared/*) run_all_go="true"; go_changed="true" ;;
              services/iam/*) modules+=("services/iam"); go_changed="true" ;;
              services/policy/*) modules+=("services/policy"); go_changed="true" ;;
              services/alerting/*) modules+=("services/alerting"); go_changed="true" ;;
              services/threat/*) modules+=("services/threat"); go_changed="true" ;;
              services/audit/*) modules+=("services/audit"); go_changed="true" ;;
              services/compliance/*) modules+=("services/compliance"); go_changed="true" ;;
              services/connector-registry/*) modules+=("services/connector-registry"); go_changed="true" ;;
              services/control-plane/*) modules+=("services/control-plane"); go_changed="true" ;;
              services/dlp/*) modules+=("services/dlp"); go_changed="true" ;;
              services/webhook-delivery/*) modules+=("services/webhook-delivery"); go_changed="true" ;;
              web/*) infra_changed="true" ;;
              infra/*) infra_changed="true" ;;
              .github/workflows/ci.yml) run_all_go="true"; infra_changed="true" ;;
              .golangci.yml) run_all_go="true" ;;
              go.work|go.work.sum) run_all_go="true" ;;
            esac
          done

          if [ "$run_all_go" == "true" ]; then
            modules=("sdk" "shared" "services/iam" "services/policy" "services/alerting" "services/threat" "services/audit" "services/compliance" "services/connector-registry" "services/control-plane" "services/dlp" "services/webhook-delivery" "tests/integration")
            go_changed="true"
          fi

          if [ ${#modules[@]} -eq 0 ]; then
            unique="[]"
          else
            unique=$(printf "%s\n" "${modules[@]}" | sort -u | jq -R . | jq -s -c .)
          fi
          echo "modules=$unique" >> $GITHUB_OUTPUT
          echo "infra_changed=$infra_changed" >> $GITHUB_OUTPUT
          echo "go_changed=$go_changed" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────
  lint-infra:
    name: "Lint Infra/Web"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: SQL lint
        run: |
          pip install sqlfluff --quiet
          sqlfluff lint .
      - name: Frontend lint
        working-directory: ./web
        run: |
          npm install --prefer-offline
          npm run lint

  lint-go:
    name: "Lint Go / ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Go lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          ROOT=$(pwd)
          echo "::group::Linting ${{ matrix.module }}"
          go list ./${{ matrix.module }}/... || exit 0
          golangci-lint run --out-format json ./${{ matrix.module }}/... > mod_report.json || true
          
          if [ -f "$ROOT/.golangci-baseline.json" ]; then
             jq -r '.Issues[] | "\(.FromLinter):\(.Pos.Filename):\(.Pos.Line):\(.Text)"' mod_report.json | sort > current.txt
             jq -r '.Issues[] | "\(.FromLinter):\(.Pos.Filename):\(.Pos.Line):\(.Text)"' "$ROOT/.golangci-baseline.json" | sort > baseline.txt
             new_issues=$(comm -13 baseline.txt current.txt)
             
             if [ -n "$new_issues" ]; then
                changed_files=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD | grep '\.go$' || true)
                has_new_violation="false"
                while read -r line; do
                   [ -z "$line" ] && continue
                   file=$(echo "$line" | cut -d: -f2)
                   if echo "$changed_files" | grep -q "$file"; then
                      echo "❌ New lint issue in changed file: $line"
                      has_new_violation="true"
                   fi
                done <<< "$new_issues"
                if [ "$has_new_violation" == "true" ]; then exit 1; fi
                echo "✅ New issues found but they are in unrelated legacy files. Skipping."
             fi
          else
             if [ "$(jq '.Issues | length' mod_report.json)" -gt 0 ]; then
                jq -r '.Issues[] | "\(.Pos.Filename):\(.Pos.Line) \(.Text)"' mod_report.json
                exit 1
             fi
          fi
          echo "::endgroup::"

  # ─────────────────────────────────────────
  # 2. UNIT TESTS  (matrix)
  # ─────────────────────────────────────────
  test:
    name: "Test / ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    env:
      KAFKA_BROKERS: "localhost:9092"
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/openguard?sslmode=disable"
      REDIS_URL: "redis://localhost:6379/0"
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Run tests
        run: |
          go test -race -short ./${{ matrix.module }}/...

  # ─────────────────────────────────────────
  # 3. BACKEND BUILD
  # ─────────────────────────────────────────
  build:
    name: "Build (backend)"
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.go_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Build all modules
        run: |
          go work sync
          go build ./sdk/... ./shared/... \
            ./services/iam/... ./services/policy/... ./services/alerting/... \
            ./services/threat/... ./services/audit/... ./services/compliance/... \
            ./services/control-plane/... ./services/dlp/... \
            ./services/connector-registry/... ./services/webhook-delivery/...

  # ─────────────────────────────────────────
  # 4. FRONTEND BUILD
  # ─────────────────────────────────────────
  web-build:
    name: "Build (frontend)"
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-infra]
    if: needs.detect-changes.outputs.infra_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: ./web
        run: |
          npm ci
          npm run build

  # ─────────────────────────────────────────
  # 5. SECURITY
  # ─────────────────────────────────────────
  security:
    name: "Security scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go list -m -f '{{.Dir}}' \
            | grep -v "examples" \
            | xargs -L1 -I {} sh -c 'cd {} && govulncheck ./... || true'
