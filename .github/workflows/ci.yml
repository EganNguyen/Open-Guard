name: Fast CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # BUILD & TEST CORE: The absolute bare minimum to ensure code integrity
  build-and-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Sync Workspace
        run: go work sync

      - name: Build All Production Modules
        run: |
          go build ./sdk/... ./shared/... services/iam/... services/policy/... services/alerting/... services/audit/... services/threat/... services/control-plane/... services/dlp/... services/compliance/... services/connector-registry/... services/webhook-delivery/...

      - name: Run Core Unit Tests
        run: |
          go test -short ./sdk/... ./shared/... services/iam/... services/policy/...

  # DASHBOARD: Build check for frontend
  web-build:
    name: "Dashboard Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
      - name: Build Angular Web
        working-directory: ./web
        run: |
          npm install
          npm run build
