name: Production CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  # Using 1.24 to match available golangci-lint toolchain
  GO_VERSION: "1.24"
  # Using Node 22 (Current LTS) for dashboard stability
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Go lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.5
          for mod in sdk shared services/* tests/integration; do
            if [ -d "$mod" ] && [ -f "$mod/go.mod" ]; then
              echo "Linting $mod..."
              (cd "$mod" && go mod tidy && go list ./... >/dev/null 2>&1 && \
                $(go env GOPATH)/bin/golangci-lint run --timeout=10m ./...)
            fi
          done

      - name: SQL lint
        run: |
          pip install sqlfluff --quiet
          sqlfluff lint .

      - name: Frontend lint
        working-directory: ./web
        run: |
          npm install --prefer-offline
          npm run lint

  # ─────────────────────────────────────────
  # 2. UNIT TESTS  (matrix, parallel, -short)
  # ─────────────────────────────────────────
  test:
    name: "Test / ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false          # one failing module doesn't cancel the others
      matrix:
        module:
          - sdk
          - shared
          - services/iam
          - services/policy
          - services/alerting
          - services/threat
          - services/audit
          - services/compliance
          - services/connector-registry
          - services/control-plane
          - services/dlp
          - services/webhook-delivery
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Run tests
        run: |
          go work sync
          go test -race -short ./${{ matrix.module }}/...

  # ─────────────────────────────────────────
  # 3. BACKEND BUILD
  # ─────────────────────────────────────────
  build:
    name: "Build (backend)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Build all modules
        run: |
          go work sync
          # In a Go workspace, we build individual module paths. 
          # The ./services/... wildcard is invalid if the 'services' directory isn't a module itself.
          go build ./sdk/... ./shared/... \
            ./services/iam/... ./services/policy/... ./services/alerting/... \
            ./services/threat/... ./services/audit/... ./services/compliance/... \
            ./services/control-plane/... ./services/dlp/... \
            ./services/connector-registry/... ./services/webhook-delivery/...

  # ─────────────────────────────────────────
  # 4. FRONTEND BUILD  (parallel with tests)
  # ─────────────────────────────────────────
  web-build:
    name: "Build (frontend)"
    runs-on: ubuntu-latest
    needs: lint
    if: always()              # runs alongside tests, not blocked by them
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: ./web
        run: |
          npm ci
          npm run build

  # ─────────────────────────────────────────
  # 5. SECURITY  (advisory — || true keeps exit 0)
  # ─────────────────────────────────────────
  security:
    name: "Security scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go list -m -f '{{.Dir}}' \
            | grep -v "examples" \
            | xargs -L1 -I {} sh -c 'cd {} && govulncheck ./... || true'
          # Results are visible in logs; they don't fail the pipeline.
          # Promote to a hard failure once you have a clean baseline.
