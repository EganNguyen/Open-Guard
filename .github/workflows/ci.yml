name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Run Tests
      run: |
        go work sync
        # Iterate over modules and only run tests if the module contains Go files
        go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c 'cd {} && if find . -name "*.go" | grep -q ".go"; then go test ./... -race -coverprofile=coverage.out -timeout 5m; else echo "Skipping {} (no Go files)"; fi'

  go-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: v1.59
        args: --timeout=5m

  sql-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install sqlfluff
      run: pip install sqlfluff
    - name: Run SQL lint
      run: sqlfluff lint .

  angular-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'
    - name: Install dependencies
      run: npm install
    - name: Build Angular
      run: npm run build

  contract-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Run Contract Tests
      run: |
        # Only run if TestContract exists in any module
        go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c 'cd {} && if grep -rq "TestContract" .; then go test ./... -run TestContract -v; fi'

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        # Run govulncheck for each module that has Go files
        go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c 'cd {} && if find . -name "*.go" | grep -q ".go"; then govulncheck ./...; fi'
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
