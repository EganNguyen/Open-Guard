name: Full Production Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # STEP 1-3: Checkout, Setup, Lint/Format
  lint-and-format:
    name: "1-3: Checkout, Setup, Lint/Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 1. Checkout
      
      - name: Setup Go # 2. Setup Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools (Lint/Format)
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.59.1
          pip install sqlfluff
          npm install -g prettier

      - name: Run Go Lint # 3. Lint / Format Check
        run: |
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c 'cd {} && if find . -name "*.go" | grep -q ".go"; then $(go env GOPATH)/bin/golangci-lint run ./...; fi'
      
      - name: Run SQL Lint
        run: sqlfluff lint .

      - name: Run Format Check (Prettier)
        run: npx prettier --check .

  # STEP 4: Build
  build:
    name: "4: Build"
    needs: lint-and-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Go Services
        run: |
          go work sync
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c 'cd {} && if find . -name "*.go" | grep -q ".go"; then go build ./...; fi'
      - name: Build Angular Web
        working-directory: ./web
        run: |
          npm install
          npm run build

  # STEP 5: Unit Tests
  unit-tests:
    name: "5: Unit Tests"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Unit Tests with Coverage
        run: |
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c '
            cd {} && if find . -name "*.go" | grep -q ".go"; then
              go test -v -short -tags=!integration -coverprofile=coverage.out ./...
              go tool cover -func=coverage.out
            fi'
      - name: Aggregate Coverage
        run: |
          echo "mode: set" > coverage-total.out
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c '
            if [ -f {}/coverage.out ]; then
              grep -v "mode: set" {}/coverage.out >> coverage-total.out
            fi'
          go tool cover -func=coverage-total.out
      - name: Coverage Gate
        run: |
          total=$(go tool cover -func=coverage-total.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total Coverage: $total%"
          if [ -z "$total" ]; then total=0; fi
          if [ "$(echo "$total < 80" | bc -l)" -eq 1 ]; then
            echo "Coverage $total% is below 80% threshold"
            exit 1
          fi

  # STEP 6: Integration Tests
  integration-tests:
    name: "6: Integration Tests"
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openguard
          POSTGRES_PASSWORD: openguard
          POSTGRES_DB: openguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/
      - name: Verify migrations reversible
        run: |
          export DATABASE_URL="postgres://openguard:openguard@localhost:5432/openguard?sslmode=disable"
          migrate -path services/iam/migrations -database $DATABASE_URL up
          migrate -path services/iam/migrations -database $DATABASE_URL down
          migrate -path services/policy/migrations -database $DATABASE_URL up
          migrate -path services/policy/migrations -database $DATABASE_URL down
      - name: Run Integration/Contract Tests
        run: |
          # Targeting specific patterns that represent integration/contract boundaries
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c 'cd {} && if grep -rq "TestContract\|TestIntegration" .; then go test ./... -run "TestContract\|TestIntegration" -v; fi'

  # STEP 7-8: Security & Dependency Scan
  security-and-dependencies:
    name: "7-8: Security & Dependency Scan"
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Scan (Govulncheck) # 8. Dependency Scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c 'cd {} && if find . -name "*.go" | grep -q ".go"; then $(go env GOPATH)/bin/govulncheck ./...; fi'
      - name: SAST (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c \
            'cd {} && if find . -name "*.go" | grep -q ".go"; then $(go env GOPATH)/bin/gosec ./...; fi'
      - name: Go module verification
        run: go mod verify
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
      - name: Security Scan (Trivy) # 7. Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'

  # STEP 9-10: Artifact Build & Store
  artifact-management:
    name: "9-10: Artifact Build & Store"
    needs: security-and-dependencies
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [iam, control-plane, policy, alerting, audit, threat, dlp, compliance, webhook-delivery, connector-registry]
    steps:
      - uses: actions/checkout@v4 # 9. Artifact Build
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Store Artifact # 10. Store Artifact
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openguard-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/openguard-${{ matrix.service }}:${{ github.sha }}
