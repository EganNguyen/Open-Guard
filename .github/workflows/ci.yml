name: Production CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =========================
  # 1. LINT (STRICT GATE)
  # =========================
  lint:
    name: "Lint (Go + Frontend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
          | sh -s -- -b $(go env GOPATH)/bin latest

      - name: Run Go Lint
        run: |
          # Using workspace-aware linting with explicit context
          go work sync
          $(go env GOPATH)/bin/golangci-lint run ./...

  # =========================
  # 2. TEST (PARALLEL READY)
  # =========================
  test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        module:
          - sdk
          - shared
          - services/iam
          - services/policy
          - services/alerting
          - services/threat

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Run Tests
        run: |
          go work sync
          go test -race -short ./${{ matrix.module }}/...

  # =========================
  # 3. BUILD
  # =========================
  build:
    name: "Build Services"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Build Backend
        run: |
          go work sync
          go build ./sdk/... ./shared/... ./services/...

  # =========================
  # 4. FRONTEND BUILD
  # =========================
  web-build:
    name: "Frontend Build"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Web
        working-directory: ./web
        run: |
          npm ci
          npm run build

  # =========================
  # 5. SECURITY
  # =========================
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Run govulncheck across all production modules
          # We use a pattern that works with the workspace
          go list -m -f '{{.Dir}}' | grep -v "examples" | xargs -L1 -I {} sh -c 'cd {} && govulncheck ./...' || true
