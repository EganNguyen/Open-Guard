name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Run Tests
      run: |
        go work sync
        # Test all workspace modules
        go test ./sdk/... ./services/... ./shared/... -race -coverprofile=coverage.out -timeout 5m

  go-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: v1.59
        args: --timeout=5m
      continue-on-error: true # Keep non-blocking for now if it's too strict

  sql-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install sqlfluff
      run: pip install sqlfluff
    - name: Run SQL lint
      run: |
        # Lint all migration files found in the repo
        sqlfluff lint . --dialect postgres --ignore parsing

  angular-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'
    - name: Install dependencies
      run: npm install
    - name: Build Angular
      run: npm run build

  contract-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Run Contract Tests
      run: |
        # Check if contract tests exist before running, otherwise it might fail the job
        if grep -r "TestContract" ./shared ./services; then
          go test ./shared/... ./services/... -run TestContract -v
        else
          echo "No contract tests found matching 'TestContract'"
        fi

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    - name: Govulncheck
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
