name: Fast CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # STEP 1: Fast Build & Build Verification
  build-and-verify:
    name: "Build & Verify"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      
      - name: Sync Workspace
        run: go work sync

      - name: Build All Production Modules
        run: |
          go build ./sdk/... ./shared/... services/iam/... services/policy/... services/alerting/... services/audit/... services/threat/... services/control-plane/... services/dlp/... services/compliance/... services/connector-registry/... services/webhook-delivery/...

      - name: Run Core Unit Tests
        run: |
          go test -v -short ./sdk/... ./shared/... services/iam/... services/policy/...

  # STEP 2: Dashboard Build
  web-build:
    name: "Dashboard Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
      - name: Build Angular Web
        working-directory: ./web
        run: |
          npm install
          npm run build

  # STEP 3: SAST Lite
  security-lite:
    name: "Security Scan Lite"
    needs: [build-and-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Dependency Scan (Govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # govulncheck supports workspaces but requires the path to be specified or run from module roots.
          # We'll run it on the main production components.
          govulncheck ./sdk/... ./shared/...
          govulncheck ./services/iam/... ./services/policy/... ./services/alerting/...
