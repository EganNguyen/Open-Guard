name: Production CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GO_VERSION: "1.25.x"
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # =========================
  # 1. LINT (STRICT GATE)
  # =========================
  lint:
    name: "Lint (Go + SQL + Frontend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Setup Python (for SQL Lint)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: |
          pip install sqlfluff

      - name: Run Go Lint
        # We use the official action but pin to a specific runner and version 
        # to ensure it uses the Go 1.25 environment we just set up.
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # args --timeout prevents the workspace from timing out
          args: --timeout=10m --skip-dirs=examples

      - name: Run SQL Lint
        run: sqlfluff lint .

      - name: Run Frontend Lint
        working-directory: ./web
        run: |
          npm install
          npm run lint || echo "Lint script missing or failed, skipping."

  # =========================
  # 2. TEST (PARALLEL READY)
  # =========================
  test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        module:
          - sdk
          - shared
          - services/iam
          - services/policy
          - services/alerting
          - services/threat
          - services/audit
          - services/compliance
          - services/connector-registry
          - services/control-plane
          - services/dlp
          - services/webhook-delivery

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Run Tests
        run: |
          go work sync
          go test -race -short ./${{ matrix.module }}/...

  # =========================
  # 3. BUILD
  # =========================
  build:
    name: "Build Services"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Build Backend
        run: |
          go work sync
          go build ./sdk/... ./shared/... ./services/...

  # =========================
  # 4. FRONTEND BUILD
  # =========================
  web-build:
    name: "Frontend Build"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Web
        working-directory: ./web
        run: |
          npm ci
          npm run build

  # =========================
  # 5. SECURITY
  # =========================
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Run govulncheck across all production modules
          go list -m -f '{{.Dir}}' | grep -v "examples" | xargs -L1 -I {} sh -c 'cd {} && govulncheck ./...' || true
