name: Production CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # 0. DETECT CHANGES
  # ─────────────────────────────────────────
  detect-changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set-matrix.outputs.modules }}
      go_changed: ${{ steps.filter.outputs.go }}
      infra_changed: ${{ steps.filter.outputs.infra }}
      shared_changed: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - 'sdk/**'
            shared:
              - 'shared/**'
            iam:
              - 'services/iam/**'
            policy:
              - 'services/policy/**'
            alerting:
              - 'services/alerting/**'
            threat:
              - 'services/threat/**'
            audit:
              - 'services/audit/**'
            compliance:
              - 'services/compliance/**'
            connector-registry:
              - 'services/connector-registry/**'
            control-plane:
              - 'services/control-plane/**'
            dlp:
              - 'services/dlp/**'
            webhook-delivery:
              - 'services/webhook-delivery/**'
            web:
              - 'web/**'
            infra:
              - 'infra/**'
            workflow:
              - '.github/workflows/ci.yml'
            go:
              - 'sdk/**'
              - 'shared/**'
              - 'services/**'
              - 'go.work'
              - 'go.work.sum'

      - id: set-matrix
        run: |
          MODULES=()
          SHARED="${{ steps.filter.outputs.shared }}"
          WORKFLOW="${{ steps.filter.outputs.workflow }}"
          
          if [ "$SHARED" == "true" ] || [ "$WORKFLOW" == "true" ]; then
            MODULES=("sdk" "shared" "services/iam" "services/policy" "services/alerting" "services/threat" "services/audit" "services/compliance" "services/connector-registry" "services/control-plane" "services/dlp" "services/webhook-delivery")
          else
            [[ "${{ steps.filter.outputs.sdk }}" == "true" ]] && MODULES+=("sdk")
            [[ "${{ steps.filter.outputs.iam }}" == "true" ]] && MODULES+=("services/iam")
            [[ "${{ steps.filter.outputs.policy }}" == "true" ]] && MODULES+=("services/policy")
            [[ "${{ steps.filter.outputs.alerting }}" == "true" ]] && MODULES+=("services/alerting")
            [[ "${{ steps.filter.outputs.threat }}" == "true" ]] && MODULES+=("services/threat")
            [[ "${{ steps.filter.outputs.audit }}" == "true" ]] && MODULES+=("services/audit")
            [[ "${{ steps.filter.outputs.compliance }}" == "true" ]] && MODULES+=("services/compliance")
            [[ "${{ steps.filter.outputs.connector-registry }}" == "true" ]] && MODULES+=("services/connector-registry")
            [[ "${{ steps.filter.outputs.control-plane }}" == "true" ]] && MODULES+=("services/control-plane")
            [[ "${{ steps.filter.outputs.dlp }}" == "true" ]] && MODULES+=("services/dlp")
            [[ "${{ steps.filter.outputs.webhook-delivery }}" == "true" ]] && MODULES+=("services/webhook-delivery")
          fi

          if [ ${#MODULES[@]} -eq 0 ]; then
            unique="[]"
          else
            unique=$(printf "%s\n" "${MODULES[@]}" | sort -u | jq -R . | jq -s -c .)
          fi
          echo "modules=$unique" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────
  lint-infra:
    name: "Lint Infra/Web"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: SQL lint
        run: |
          pip install sqlfluff --quiet
          sqlfluff lint .
      - name: Frontend lint
        working-directory: ./web
        run: |
          npm install --prefer-offline
          npm run lint

  lint-go:
    name: "Lint Go / ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Go lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          ROOT=$(pwd)
          echo "::group::Linting ${{ matrix.module }}"
          go list ./${{ matrix.module }}/... || exit 0
          golangci-lint run --out-format json ./${{ matrix.module }}/... > mod_report.json || true
          
          if [ -f "$ROOT/.golangci-baseline.json" ]; then
             jq -r '.Issues[] | "\(.FromLinter):\(.Pos.Filename):\(.Pos.Line):\(.Text)"' mod_report.json | sort > current.txt
             jq -r '.Issues[] | "\(.FromLinter):\(.Pos.Filename):\(.Pos.Line):\(.Text)"' "$ROOT/.golangci-baseline.json" | sort > baseline.txt
             new_issues=$(comm -13 baseline.txt current.txt)
             
             if [ -n "$new_issues" ]; then
                changed_files=$(git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD | grep '\.go$' || true)
                has_new_violation="false"
                while read -r line; do
                   [ -z "$line" ] && continue
                   file=$(echo "$line" | cut -d: -f2)
                   if echo "$changed_files" | grep -q "$file"; then
                      echo "❌ New lint issue in changed file: $line"
                      has_new_violation="true"
                   fi
                done <<< "$new_issues"
                if [ "$has_new_violation" == "true" ]; then exit 1; fi
                echo "✅ New issues found but they are in unrelated legacy files. Skipping."
             fi
          else
             if [ "$(jq '.Issues | length' mod_report.json)" -gt 0 ]; then
                jq -r '.Issues[] | "\(.Pos.Filename):\(.Pos.Line) \(.Text)"' mod_report.json
                exit 1
             fi
          fi
          echo "::endgroup::"

  # ─────────────────────────────────────────
  # 2. UNIT TESTS  (matrix)
  # ─────────────────────────────────────────
  test:
    name: "Test / ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    env:
      KAFKA_BROKERS: "localhost:9092"
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/openguard?sslmode=disable"
      REDIS_URL: "redis://localhost:6379/0"
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Run tests
        run: |
          go test -race -short ./${{ matrix.module }}/...

  # ─────────────────────────────────────────
  # 3. BACKEND BUILD
  # ─────────────────────────────────────────
  build:
    name: "Build (backend)"
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: |
      always() &&
      needs.detect-changes.outputs.go_changed == 'true' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Build all modules
        run: |
          go work sync
          go build ./sdk/... ./shared/... \
            ./services/iam/... ./services/policy/... ./services/alerting/... \
            ./services/threat/... ./services/audit/... ./services/compliance/... \
            ./services/control-plane/... ./services/dlp/... \
            ./services/connector-registry/... ./services/webhook-delivery/...

  # ─────────────────────────────────────────
  # 4. FRONTEND BUILD
  # ─────────────────────────────────────────
  web-build:
    name: "Build (frontend)"
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-infra]
    if: needs.detect-changes.outputs.infra_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: ./web
        run: |
          npm ci
          npm run build

  # ─────────────────────────────────────────
  # 5. SECURITY
  # ─────────────────────────────────────────
  security:
    name: "Security scan"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go list -m -f '{{.Dir}}' \
            | grep -v "examples" \
            | xargs -L1 -I {} sh -c 'cd {} && govulncheck ./... || true'
