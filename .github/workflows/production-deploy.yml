name: OpenGuard CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # PHASE 1: CI (Quality Control)
  ci-quality:
    name: CI (Lint & Unit Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go Format Check
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "::error::Go files not formatted. Run 'go fmt ./...'"
            gofmt -l .
            exit 1
          fi

      - name: Run Unit Tests
        run: |
          go work sync
          go test -v -race ./sdk/... ./shared/...

  # PHASE 2: Build Microservices
  build-services:
    name: Build Microservices
    needs: ci-quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [iam, policy, audit, threat, alerting, webhook-delivery, compliance, dlp, connector-registry, control-plane, example-app, dashboard]
        include:
          - service: iam
            path: services/iam/Dockerfile
          - service: policy
            path: services/policy/Dockerfile
          - service: audit
            path: services/audit/Dockerfile
          - service: threat
            path: services/threat/Dockerfile
          - service: alerting
            path: services/alerting/Dockerfile
          - service: webhook-delivery
            path: services/webhook-delivery/Dockerfile
          - service: compliance
            path: services/compliance/Dockerfile
          - service: dlp
            path: services/dlp/Dockerfile
          - service: connector-registry
            path: services/connector-registry/Dockerfile
          - service: control-plane
            path: services/control-plane/Dockerfile
          - service: example-app
            path: examples/task-management-app/backend/Dockerfile
          - service: dashboard
            path: web/Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t openguard/${{ matrix.service }}:${{ github.sha }} -f ${{ matrix.path }} .

  # PHASE 3: CD (Mock Deployment & Integration Tests)
  cd-mock:
    name: CD (LocalStack Mock Deploy)
    needs: build-services
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for LocalStack
        run: |
          until curl -s http://localhost:4566/_localstack/health | grep -q "\"ecr\": \"\(running\|available\)\""; do
            echo "Waiting for LocalStack..."
            sleep 5
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Deploy (Mock)
        working-directory: deploy/production/terraform/environments/prod
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
        run: |
          cat <<EOF > provider_override.tf
          provider "aws" {
            region = "us-east-1"
            access_key = "test"
            secret_key = "test"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            endpoints {
              ecr            = "http://localhost:4566"
              ecs            = "http://localhost:4566"
              ec2            = "http://localhost:4566"
              iam            = "http://localhost:4566"
              kms            = "http://localhost:4566"
              s3             = "http://localhost:4566"
              sts            = "http://localhost:4566"
              dynamodb       = "http://localhost:4566"
              servicediscovery = "http://localhost:4566"
            }
          }
          terraform { backend "local" {} }
          EOF
          terraform init
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}" -var="domain_name=localhost"

      - name: Run Integration Smoke Test
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
        run: |
          echo "Verifying deployment state..."
          aws ecs list-clusters --endpoint-url $AWS_ENDPOINT_URL
          aws ecr describe-repositories --endpoint-url $AWS_ENDPOINT_URL

  # PHASE 4: CD (Real AWS Production) - Placeholder for Manual Gate
  cd-production:
    name: CD (AWS Production)
    needs: cd-mock
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # Requires manual approval in GitHub UI
    steps:
      - name: Deploy to Real AWS
        run: |
          echo "This job requires manual approval in the GitHub UI 'production' environment."
          echo "Once approved, it would run 'terraform apply' against your REAL AWS account."
