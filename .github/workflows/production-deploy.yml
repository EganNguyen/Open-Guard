name: Production Deployment (Mock)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-services:
    name: Build Microservices
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [iam, policy, audit, threat, alerting, webhook-delivery, compliance, dlp, connector-registry, control-plane, example-app, dashboard]
        include:
          - service: iam
            path: services/iam/Dockerfile
          - service: policy
            path: services/policy/Dockerfile
          - service: audit
            path: services/audit/Dockerfile
          - service: threat
            path: services/threat/Dockerfile
          - service: alerting
            path: services/alerting/Dockerfile
          - service: webhook-delivery
            path: services/webhook-delivery/Dockerfile
          - service: compliance
            path: services/compliance/Dockerfile
          - service: dlp
            path: services/dlp/Dockerfile
          - service: connector-registry
            path: services/connector-registry/Dockerfile
          - service: control-plane
            path: services/control-plane/Dockerfile
          - service: example-app
            path: examples/task-management-app/backend/Dockerfile
          - service: dashboard
            path: web/Dockerfile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.path }}
          push: false
          tags: openguard/${{ matrix.service }}:${{ github.sha }},openguard/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mock-deploy:
    name: Mock Infrastructure & Registry
    needs: build-services
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        env:
          SERVICES: ecr,ecs,s3,iam,sts,kms,dynamodb
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug LocalStack Container
        if: always()
        run: |
          echo "=== Docker containers ==="
          docker ps -a

          echo "=== LocalStack logs ==="
          docker logs $(docker ps -q --filter "ancestor=localstack/localstack:3.0") 2>&1 | tail -50

          echo "=== Port binding ==="
          ss -tlnp | grep 4566 || netstat -tlnp | grep 4566 || true

          echo "=== Raw health endpoint ==="
          curl -v http://localhost:4566/_localstack/health 2>&1 || true

      - name: Wait for LocalStack
        timeout-minutes: 3          # ← job-level safety net
        run: |
          echo "Waiting for LocalStack gateway..."

          # Step 1: Wait for the HTTP gateway itself (up to 60s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health > /tmp/ls_health.json 2>&1; then
              echo "Gateway responded on attempt $i"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

          # Fail fast if gateway never came up
          cat /tmp/ls_health.json || { echo "ERROR: LocalStack gateway never responded"; exit 1; }

          # Step 2: Wait for specific services to be 'running' (not just 'available')
          # Use plain string matching, no complex regex escaping
          echo "Waiting for ECR and ECS to be ready..."
          for i in $(seq 1 30); do
            HEALTH=$(curl -sf http://localhost:4566/_localstack/health 2>/dev/null || echo "{}")

            ECR_STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('services',{}).get('ecr','not_found'))" 2>/dev/null || echo "parse_error")
            ECS_STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('services',{}).get('ecs','not_found'))" 2>/dev/null || echo "parse_error")

            echo "  attempt $i/30 — ecr: $ECR_STATUS, ecs: $ECS_STATUS"

            if [ "$ECR_STATUS" = "running" ] && [ "$ECS_STATUS" = "running" ]; then
              echo "All required services are ready."
              exit 0
            fi
            sleep 2
          done

          # If we get here, dump the final health state for debugging
          echo "ERROR: Services did not become ready in time. Final health response:"
          curl -sf http://localhost:4566/_localstack/health | python3 -m json.tool || true
          exit 1

      - name: Create Mock ECR Repos
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
        run: |
          SERVICES="iam policy audit threat alerting webhook-delivery compliance dlp connector-registry control-plane example-app dashboard"
          for svc in $SERVICES; do
            aws ecr create-repository --repository-name openguard/$svc --endpoint-url http://localhost:4566
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (Mock)
        working-directory: deploy/production/terraform/environments/prod
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          TF_VAR_is_localstack: "true"
        run: |
          cat <<EOF > provider_override.tf
          provider "aws" {
            region = "us-east-1"
            access_key = "test"
            secret_key = "test"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            endpoints {
              ecr            = "http://localhost:4566"
              ecs            = "http://localhost:4566"
              ec2            = "http://localhost:4566"
              iam            = "http://localhost:4566"
              kms            = "http://localhost:4566"
              s3             = "http://localhost:4566"
              sts            = "http://localhost:4566"
              dynamodb       = "http://localhost:4566"
              servicediscovery = "http://localhost:4566"
            }
          }
          terraform {
            backend "local" {}
          }
          EOF
          terraform init
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}" -var="domain_name=localhost"

      - name: Verify Mock Deployment
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          echo "Listing Created Mock Resources:"
          aws ecs list-clusters --endpoint-url $AWS_ENDPOINT_URL
          aws ecr describe-repositories --endpoint-url $AWS_ENDPOINT_URL
          aws s3 ls --endpoint-url $AWS_ENDPOINT_URL
