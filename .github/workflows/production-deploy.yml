name: Production Deployment (Mock)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-services:
    name: Build Microservices
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [iam, policy, audit, threat, alerting, webhook-delivery, compliance, dlp, connector-registry, control-plane, example-app, dashboard]
        include:
          - service: iam
            path: services/iam/Dockerfile
          - service: policy
            path: services/policy/Dockerfile
          - service: audit
            path: services/audit/Dockerfile
          - service: threat
            path: services/threat/Dockerfile
          - service: alerting
            path: services/alerting/Dockerfile
          - service: webhook-delivery
            path: services/webhook-delivery/Dockerfile
          - service: compliance
            path: services/compliance/Dockerfile
          - service: dlp
            path: services/dlp/Dockerfile
          - service: connector-registry
            path: services/connector-registry/Dockerfile
          - service: control-plane
            path: services/control-plane/Dockerfile
          - service: example-app
            path: examples/task-management-app/backend/Dockerfile
          - service: dashboard
            path: web/Dockerfile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        env:
          SERVICE: ${{ matrix.service }}
          DOCKERFILE: ${{ matrix.path }}
        run: |
          docker build -t openguard/$SERVICE:${{ github.sha }} -f $DOCKERFILE .
          docker tag openguard/$SERVICE:${{ github.sha }} openguard/$SERVICE:latest

  mock-deploy:
    name: Mock Infrastructure & Registry
    needs: build-services
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        env:
          SERVICES: ecr,ecs,s3,iam,sts,kms,dynamodb
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for LocalStack
        run: |
          echo "Waiting for LocalStack gateway to respond..."
          until curl -s http://localhost:4566/_localstack/health | grep -q "\"status\": \"\(running\|initialized\)\""; do
            sleep 2
          done
          echo "LocalStack is up. Forcing service activation..."
          aws ecr describe-repositories --endpoint-url http://localhost:4566 --region us-east-1 || true

      - name: Create Mock ECR Repos
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
        run: |
          SERVICES="iam policy audit threat alerting webhook-delivery compliance dlp connector-registry control-plane example-app dashboard"
          for svc in $SERVICES; do
            aws ecr create-repository --repository-name openguard/$svc --endpoint-url http://localhost:4566
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (Mock)
        working-directory: deploy/production/terraform/environments/prod
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          TF_VAR_is_localstack: "true"
        run: |
          cat <<EOF > provider_override.tf
          provider "aws" {
            region = "us-east-1"
            access_key = "test"
            secret_key = "test"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            endpoints {
              ecr            = "http://localhost:4566"
              ecs            = "http://localhost:4566"
              ec2            = "http://localhost:4566"
              iam            = "http://localhost:4566"
              kms            = "http://localhost:4566"
              s3             = "http://localhost:4566"
              sts            = "http://localhost:4566"
              dynamodb       = "http://localhost:4566"
              servicediscovery = "http://localhost:4566"
            }
          }
          terraform {
            backend "local" {}
          }
          EOF
          terraform init
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}" -var="domain_name=localhost"

      - name: Verify Mock Deployment
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          echo "Listing Created Mock Resources:"
          aws ecs list-clusters --endpoint-url $AWS_ENDPOINT_URL
          aws ecr describe-repositories --endpoint-url $AWS_ENDPOINT_URL
          aws s3 ls --endpoint-url $AWS_ENDPOINT_URL
