name: Production Deployment (Mock)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push (Mock ECR)
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
    strategy:
      fail-fast: false
      matrix:
        service: [iam, policy, audit, threat, alerting, webhook-delivery, compliance, dlp, connector-registry, control-plane, example-app, dashboard]
        include:
          - service: iam
            path: services/iam/Dockerfile
          - service: policy
            path: services/policy/Dockerfile
          - service: audit
            path: services/audit/Dockerfile
          - service: threat
            path: services/threat/Dockerfile
          - service: alerting
            path: services/alerting/Dockerfile
          - service: webhook-delivery
            path: services/webhook-delivery/Dockerfile
          - service: compliance
            path: services/compliance/Dockerfile
          - service: dlp
            path: services/dlp/Dockerfile
          - service: connector-registry
            path: services/connector-registry/Dockerfile
          - service: control-plane
            path: services/control-plane/Dockerfile
          - service: example-app
            path: examples/task-management-app/backend/Dockerfile
          - service: dashboard
            path: web/Dockerfile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Wait for LocalStack
        run: |
          until curl -s http://localhost:4566/_localstack/health | grep -q "\"ecr\": \"\(running\|available\)\""; do
            echo "Waiting for LocalStack..."
            sleep 5
          done

      - name: Create Mock ECR Repos
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          aws ecr create-repository --repository-name openguard/${{ matrix.service }} --endpoint-url $AWS_ENDPOINT_URL

      - name: Build and Tag Docker Image
        env:
          ECR_REGISTRY: localhost:4566
          SERVICE: ${{ matrix.service }}
          DOCKERFILE: ${{ matrix.path }}
        run: |
          docker build -t $ECR_REGISTRY/openguard/$SERVICE:${{ github.sha }} -f $DOCKERFILE .
          docker tag $ECR_REGISTRY/openguard/$SERVICE:${{ github.sha }} $ECR_REGISTRY/openguard/$SERVICE:latest

      - name: Push to Mock ECR
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          # LocalStack ECR allows unauthenticated pushes from localhost
          docker push localhost:4566/openguard/${{ matrix.service }}:${{ github.sha }}
          docker push localhost:4566/openguard/${{ matrix.service }}:latest

  deploy-infra-mock:
    name: Provision Mock Infrastructure
    needs: build-and-push
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (Mock)
        working-directory: deploy/production/terraform/environments/prod
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          TF_VAR_is_localstack: "true"
        run: |
          # Use local state for mock testing as requested
          cat <<EOF > provider_override.tf
          provider "aws" {
            region = "us-east-1"
            access_key = "test"
            secret_key = "test"
            skip_credentials_validation = true
            skip_metadata_api_check     = true
            skip_requesting_account_id  = true
            endpoints {
              ecr            = "http://localhost:4566"
              ecs            = "http://localhost:4566"
              ec2            = "http://localhost:4566"
              iam            = "http://localhost:4566"
              kms            = "http://localhost:4566"
              s3             = "http://localhost:4566"
              sts            = "http://localhost:4566"
              dynamodb       = "http://localhost:4566"
              servicediscovery = "http://localhost:4566"
            }
          }
          terraform {
            backend "local" {}
          }
          EOF
          terraform init
          terraform apply -auto-approve -var="image_tag=${{ github.sha }}" -var="domain_name=localhost"

      - name: Verify Mock Resources
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          echo "Listing Created Mock Resources:"
          aws ecs list-clusters --endpoint-url $AWS_ENDPOINT_URL
          aws ecr describe-repositories --endpoint-url $AWS_ENDPOINT_URL
