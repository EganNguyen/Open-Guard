id: JOB-05
title: "Test Coverage — From Near-Zero to Production Baseline"
priority: P1
phase_impact: [1, 2, 3, 4, 5]
severity: HIGH
estimated_effort: 7d

summary: |
  The entire codebase has exactly ONE test file (shared/crypto/crypto_test.go)
  and it contains only a math smoke test (`1+1 != 2`). This means the CI
  `unit-tests` job runs and passes against zero meaningful tests — giving false
  confidence. The spec (§00) mandates 80% unit test coverage on business logic.
  No phase acceptance criteria can be considered verified without tests.

problems:
  - id: TEST-01
    title: "shared/crypto — no tests for any cryptographic operations"
    file: shared/crypto/crypto_test.go
    severity: HIGH
    description: |
      The crypto package contains production-critical functions (JWT sign/verify,
      AES-256-GCM encrypt/decrypt, PBKDF2 hash/verify, key rotation) with zero
      meaningful tests. Bugs here affect every service.

    fix: |
      Replace the smoke test with comprehensive tests:

      ```go
      package crypto_test

      import (
          "testing"
          "github.com/openguard/shared/crypto"
      )

      func TestJWTSignAndVerify(t *testing.T) {
          keyring := []crypto.JWTKey{{Kid: "k1", Secret: "test-secret-at-least-32-bytes!!", Algorithm: "HS256", Status: "active"}}
          claims := crypto.NewStandardClaims("org1", "user1", "jti1", time.Hour)
          token, err := crypto.Sign(claims, keyring)
          if err != nil { t.Fatal(err) }

          out := &crypto.StandardClaims{}
          _, err = crypto.Verify(token, keyring, out)
          if err != nil { t.Fatal(err) }
          if out.UserID != "user1" { t.Errorf("expected user1, got %s", out.UserID) }
      }

      func TestJWTVerifyRejectsExpired(t *testing.T) {
          keyring := []crypto.JWTKey{{Kid: "k1", Secret: "test-secret-at-least-32-bytes!!", Algorithm: "HS256", Status: "active"}}
          claims := crypto.NewStandardClaims("org1", "user1", "jti1", -time.Second)
          token, _ := crypto.Sign(claims, keyring)
          _, err := crypto.Verify(token, keyring, &crypto.StandardClaims{})
          if err == nil { t.Error("expected error for expired token") }
      }

      func TestJWTKeyRotation(t *testing.T) {
          // Sign with old key, verify with keyring that has old (verify_only) + new (active) key
          oldKey := crypto.JWTKey{Kid: "old", Secret: "old-secret-at-least-32-bytes-!!", Algorithm: "HS256", Status: "verify_only"}
          newKey := crypto.JWTKey{Kid: "new", Secret: "new-secret-at-least-32-bytes-!!", Algorithm: "HS256", Status: "active"}
          claims := crypto.NewStandardClaims("org1", "user1", "jti1", time.Hour)
          // Sign with old key only
          token, _ := crypto.Sign(claims, []crypto.JWTKey{oldKey})
          // Verify with full keyring — should work
          _, err := crypto.Verify(token, []crypto.JWTKey{newKey, oldKey}, &crypto.StandardClaims{})
          if err != nil { t.Fatal(err) }
      }

      func TestAESEncryptDecrypt(t *testing.T) {
          keyring := []crypto.EncryptionKey{{Kid: "k1", Key: base64.StdEncoding.EncodeToString(make([]byte, 32)), Status: "active"}}
          plaintext := []byte("sensitive-totp-secret")
          ciphertext, err := crypto.Encrypt(plaintext, keyring)
          if err != nil { t.Fatal(err) }
          if ciphertext == string(plaintext) { t.Error("ciphertext should not equal plaintext") }

          decrypted, err := crypto.Decrypt(ciphertext, keyring)
          if err != nil { t.Fatal(err) }
          if string(decrypted) != string(plaintext) { t.Errorf("decryption mismatch") }
      }

      func TestPBKDF2HashAndVerify(t *testing.T) {
          hash := crypto.HashPBKDF2("my-api-key")
          if !crypto.VerifyPBKDF2("my-api-key", hash) { t.Error("valid key should verify") }
          if crypto.VerifyPBKDF2("wrong-key", hash) { t.Error("wrong key should not verify") }
      }

      func TestPBKDF2ConstantTime(t *testing.T) {
          // Verify timing is consistent regardless of where mismatch occurs
          // This is a best-effort test — real timing tests need benchmarks
          hash := crypto.HashPBKDF2("correct")
          _ = crypto.VerifyPBKDF2("aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa", hash)
          _ = crypto.VerifyPBKDF2("zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz", hash)
          // If implementation uses subtle.ConstantTimeCompare, these should take same time
      }
      ```

  - id: TEST-02
    title: "Policy engine — evaluate() has no tests"
    file: services/policy/pkg/service/service.go
    severity: HIGH
    description: |
      `evaluate()` is the core decision function. It has no tests. Bugs here
      silently allow or deny access. The glob matching logic (`matchesGlob`) is
      particularly tricky and untested. Table-driven tests are mandatory.

    fix: |
      Create `services/policy/pkg/service/service_test.go`:

      ```go
      package service_test

      func TestEvaluate_AllowOnRBACMatch(t *testing.T) { ... }
      func TestEvaluate_DenyAllOverridesAllow(t *testing.T) { ... }
      func TestEvaluate_DefaultDenyWithNoPolicies(t *testing.T) { ... }
      func TestEvaluate_WildcardSubject(t *testing.T) { ... }
      func TestEvaluate_GlobActionPrefix(t *testing.T) { ... }

      // Table-driven test for matchesGlob:
      var globTests = []struct {
          patterns []string
          value    string
          want     bool
      }{
          {[]string{"read:*"}, "read:documents", true},
          {[]string{"read:*"}, "write:documents", false},
          {[]string{"*"}, "anything", true},
          {[]string{"read:documents"}, "read:documents", true},
          {[]string{"read:documents"}, "read:documents:extra", false},
          {[]string{"user:*"}, "user:", true},   // boundary: prefix with empty suffix
          {[]string{}, "read:docs", false},       // empty patterns → no match
      }
      func TestMatchesGlob(t *testing.T) {
          for _, tt := range globTests {
              got := matchesGlob(tt.patterns, tt.value)  // expose via export_test.go
              if got != tt.want {
                  t.Errorf("matchesGlob(%v, %q) = %v, want %v", tt.patterns, tt.value, got, tt.want)
              }
          }
      }
      ```

      Create `services/policy/pkg/service/export_test.go` to expose private functions:
      ```go
      package service
      var MatchesGlob = matchesGlob
      ```

  - id: TEST-03
    title: "IAM service — login flow, MFA, token rotation have no tests"
    file: services/iam/pkg/service/service.go
    severity: HIGH
    description: |
      The IAM service contains the most security-critical code. Login lockout
      logic, MFA challenge flow, token family revocation on reuse — none of it
      has tests. A regression here is a security incident.

    fix: |
      Create `services/iam/pkg/service/service_test.go` using a mock repository:

      ```go
      // Tests to implement:
      func TestLogin_SuccessWithoutMFA(t *testing.T) { ... }
      func TestLogin_LockedAccount(t *testing.T) { ... }
      func TestLogin_IncrementFailedLoginCount(t *testing.T) { ... }
      func TestLogin_LockAfterTenFailures(t *testing.T) { ... }
      func TestLogin_MFARequired_ReturnsChallengeToken(t *testing.T) { ... }
      func TestRefreshToken_RevokesFamilyOnReuse(t *testing.T) { ... }
      func TestRefreshToken_RevokedToken_ReturnsError(t *testing.T) { ... }
      func TestRefreshToken_ExpiredToken_ReturnsError(t *testing.T) { ... }
      func TestVerifyMFA_InvalidCode_ReturnsError(t *testing.T) { ... }
      func TestVerifyMFA_ExpiredChallenge_ReturnsError(t *testing.T) { ... }
      func TestLogout_AddsJTIToBlocklist(t *testing.T) { ... }
      func TestSignToken_ContainsOrgIDAndUserID(t *testing.T) { ... }
      ```

      Use a mock repository interface (`MockRepository`) and a mock Redis client
      (`miniredis` library: `github.com/alicebob/miniredis/v2`) for Redis-backed tests.

  - id: TEST-04
    title: "Threat detector — brute force has no tests"
    file: services/threat/pkg/detector/brute_force.go
    severity: MEDIUM
    description: |
      The brute force detector has no tests. The `MaxAttempts` constant is 5 but
      the spec says the threshold should be configurable via `THREAT_MAX_FAILED_LOGINS`
      (default 10). The consumer hardcodes `5`. Tests would have caught this spec
      deviation.

    fix: |
      1. Make MaxAttempts configurable:
         ```go
         // In NewBruteForceDetector, read from env:
         maxAttempts := int64(10)
         if v := os.Getenv("THREAT_MAX_FAILED_LOGINS"); v != "" {
             if n, err := strconv.ParseInt(v, 10, 64); err == nil {
                 maxAttempts = n
             }
         }
         d.maxAttempts = maxAttempts
         ```

      2. Create `services/threat/pkg/detector/brute_force_test.go`:
         ```go
         func TestBruteForce_DetectsAfterThreshold(t *testing.T) {
             mr, _ := miniredis.Run()
             defer mr.Close()
             // inject miniredis client
             // send 10 login.failed events
             // assert publishThreatEvent was called
         }
         func TestBruteForce_ResetsAfterWindow(t *testing.T) {
             // send 9 events, advance clock past WindowSize, send 1 more → should NOT trigger
         }
         func TestBruteForce_TracksIPAndEmailSeparately(t *testing.T) { ... }
         ```

  - id: TEST-05
    title: "CI unit test job produces no meaningful coverage"
    file: .github/workflows/ci.yml
    severity: HIGH
    description: |
      The CI `unit-tests` job runs `go test -v -short ./...` and succeeds because
      the only test file contains a trivially true assertion. There is no coverage
      gate. Developers get green CI regardless of how much they break.

    fix: |
      1. Add coverage reporting to CI:
         ```yaml
         - name: Run Unit Tests with Coverage
           run: |
             go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c '
               cd {} && if find . -name "*.go" | grep -q ".go"; then
                 go test -v -short -coverprofile=coverage.out ./...
                 go tool cover -func=coverage.out
               fi'
         ```

      2. Add a coverage gate (fail CI if < 60% on business logic packages):
         ```yaml
         - name: Coverage Gate
           run: |
             total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
             if (( $(echo "$total < 60" | bc -l) )); then
               echo "Coverage $total% is below 60% threshold"
               exit 1
             fi
         ```

      3. Add `golangci-lint` config (`.golangci.yml`) to enable errcheck, gosec,
         staticcheck, and unparam linters — currently golangci-lint uses defaults
         which miss most critical issues.

acceptance_criteria:
  - "`go test ./...` from shared/ runs at least 15 meaningful assertions"
  - "Policy evaluate() has 100% branch coverage (all 3 logic types × allow/deny paths)"
  - "IAM Login() has tests for: success, locked, bad-password, MFA-required paths"
  - "Brute force MaxAttempts reads from THREAT_MAX_FAILED_LOGINS env var"
  - "CI coverage gate fails build when coverage drops below 60% on business logic"
  - "CI runs golangci-lint with errcheck and gosec enabled"
