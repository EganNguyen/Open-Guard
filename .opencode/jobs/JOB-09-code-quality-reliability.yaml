id: JOB-09
title: "Code Quality & Reliability — Error Handling, Memory Leaks, Correctness"
priority: P2
phase_impact: [2, 3, 4, 5]
severity: MEDIUM
estimated_effort: 3d

summary: |
  A collection of reliability issues found across the codebase: unhandled errors
  that will cause silent failures in production, a memory leak in the in-memory
  rate limiter, incorrect control-plane TLS config, missing request size limits
  on the policy service, and the SSE handler has a type assertion that will panic.

problems:
  - id: QUAL-01
    title: "url.Parse error ignored in proxy.NewProxy — silent mis-routing"
    file: services/control-plane/pkg/proxy/proxy.go
    line: 18
    severity: HIGH
    description: |
      ```go
      parsedURL, _ := url.Parse(targetURL)
      ```
      The error is silently discarded. If `targetURL` is malformed (e.g., misconfigured
      `IAM_URL` env var), `parsedURL` will be nil or partial. The `httputil.NewSingleHostReverseProxy`
      will panic or silently route to the wrong destination. Every request proxied to
      that service will fail with a cryptic 502, with no log message indicating the
      root cause.

    fix: |
      ```go
      func NewProxy(targetURL string, cb *gobreaker.CircuitBreaker) http.HandlerFunc {
          parsedURL, err := url.Parse(targetURL)
          if err != nil {
              // Fail hard at startup, not silently at request time
              panic(fmt.Sprintf("invalid proxy target URL %q: %v", targetURL, err))
          }
          if parsedURL.Host == "" {
              panic(fmt.Sprintf("proxy target URL %q has empty host", targetURL))
          }
          // ... rest of function
      }
      ```
      Panicking at startup is correct here — a mis-configured proxy target is an
      unrecoverable configuration error, not a runtime error. It surfaces immediately
      in integration tests rather than during production traffic.

  - id: QUAL-02
    title: "Control-plane TLS config loaded but ListenAndServe used (not ListenAndServeTLS)"
    file: services/control-plane/main.go
    lines: 40-55
    severity: HIGH
    description: |
      The main.go reads CA certs and builds a `tls.Config` with `ClientCAs` set for
      mTLS. However, `srv.ListenAndServe()` is called, not `srv.ListenAndServeTLS()`.
      ListenAndServe ignores the TLSConfig entirely — no TLS is active. The mTLS
      configuration is a no-op.

    fix: |
      ```go
      go func() {
          log.Info("control-plane service starting", zap.String("port", port))
          var serverErr error
          certFile := "/certs/server.crt"
          keyFile  := "/certs/server.key"
          if _, err := os.Stat(certFile); err == nil {
              // TLS certs exist — use HTTPS
              serverErr = srv.ListenAndServeTLS(certFile, keyFile)
          } else {
              // No certs — HTTP (dev mode only)
              log.Warn("TLS certs not found, starting in HTTP mode (DEV ONLY)")
              serverErr = srv.ListenAndServe()
          }
          if serverErr != nil && serverErr != http.ErrServerClosed {
              log.Fatal("server failed", zap.Error(serverErr))
          }
      }()
      ```
      Update `gen-mtls-certs.sh` to generate `server.crt` and `server.key` for
      each service alongside `ca.crt`.

  - id: QUAL-03
    title: "In-memory rate limiter clears ALL buckets every 15 minutes — resets active attackers"
    file: services/iam/pkg/middleware/ratelimit.go
    lines: 22-29
    severity: MEDIUM
    description: |
      The rate limiter clears the entire IP map every 15 minutes:
      ```go
      l.ips = make(map[string]*rate.Limiter)
      ```
      An attacker performing a brute force attack near the 15-minute boundary gets
      a free reset. Legitimate high-frequency IPs also lose their burst budget, which
      may cause brief spurious 429s on clean traffic resuming after the reset.

      Additionally, the goroutine started in `NewRateLimiter` with `time.Tick`
      never stops — it leaks if the rate limiter is garbage collected (in tests or
      if the service is refactored to create multiple rate limiters).

    fix: |
      1. Replace full-clear with TTL-based eviction using last-access timestamps:
         ```go
         type entry struct {
             limiter    *rate.Limiter
             lastAccess time.Time
         }

         func (l *RateLimiter) cleanup() {
             l.mu.Lock()
             defer l.mu.Unlock()
             cutoff := time.Now().Add(-15 * time.Minute)
             for ip, e := range l.ips {
                 if e.lastAccess.Before(cutoff) {
                     delete(l.ips, ip)
                 }
             }
         }
         ```
         This removes only idle IPs, preserving active attacker state.

      2. Use a cancellable goroutine:
         ```go
         func NewRateLimiter(r rate.Limit, b int, stop <-chan struct{}) *RateLimiter {
             l := &RateLimiter{...}
             go func() {
                 ticker := time.NewTicker(5 * time.Minute)
                 defer ticker.Stop()
                 for {
                     select {
                     case <-ticker.C:
                         l.cleanup()
                     case <-stop:
                         return
                     }
                 }
             }()
             return l
         }
         ```
         Wire `stop` channel to the service's context cancellation in main.go.

  - id: QUAL-04
    title: "Policy service missing request size limit and timeout middleware"
    file: services/policy/pkg/router/router.go
    severity: MEDIUM
    description: |
      The IAM router has `middleware.RequestSize(1 << 20)` (1MB limit). The policy
      router has none. A malicious client can send a huge `logic` JSONB payload that
      triggers large JSONB parsing in Postgres and memory allocation in Go.
      The policy evaluate endpoint is also missing a request timeout — a slow Postgres
      query will hold the goroutine indefinitely.

    fix: |
      Add to policy router:
      ```go
      r.Use(middleware.RequestSize(512 * 1024))  // 512KB max (policy logic is small)
      r.Use(middleware.Timeout(5 * time.Second)) // 5s timeout for all policy operations
      ```
      The evaluate endpoint is latency-sensitive (p99 < 30ms uncached per spec).
      A 5-second timeout is generous for normal operation while protecting against
      runaway queries.

  - id: QUAL-05
    title: "SSE handler type assertion panics on MongoDB ObjectID"
    file: services/audit/pkg/handlers/sse.go
    lines: 52-54
    severity: HIGH
    description: |
      ```go
      id := event["_id"].(interface{}).(fmt.Stringer).String()
      ```
      MongoDB `_id` is returned as `primitive.ObjectID`, which does NOT implement
      `fmt.Stringer`. This type assertion will panic at runtime on the very first
      SSE event, crashing the goroutine and closing the SSE connection silently.

    fix: |
      ```go
      import "go.mongodb.org/mongo-driver/bson/primitive"

      var id string
      switch v := event["_id"].(type) {
      case primitive.ObjectID:
          id = v.Hex()
      case string:
          id = v
      default:
          id = fmt.Sprintf("%v", v)
      }
      ```
      Alternatively, store a string `event_id` UUID field in MongoDB documents
      (already done: `event["event_id"]`) and use that as the SSE event ID instead
      of the MongoDB `_id`:
      ```go
      id, _ := event["event_id"].(string)
      if id == "" { continue }
      ```

  - id: QUAL-06
    title: "Outbox relay pg_notify LISTEN connection not reestablished on disconnect"
    file: shared/kafka/outbox/relay.go
    severity: MEDIUM
    description: |
      The outbox relay acquires a single connection for LISTEN/NOTIFY. If that
      connection drops (network blip, Postgres restart), the relay continues
      operating in polling-only mode but never reestablishes the LISTEN connection.
      No error is logged. The result is increased latency (polling interval only)
      with no operational visibility.

    fix: |
      Wrap the LISTEN connection in a reconnect loop:
      ```go
      func (r *Relay) listenLoop(ctx context.Context, notifications chan string) {
          for {
              if ctx.Err() != nil { return }

              conn, err := r.pool.Acquire(ctx)
              if err != nil {
                  r.logger.Error("failed to acquire listen connection, retrying in 5s", "error", err)
                  select {
                  case <-time.After(5 * time.Second):
                  case <-ctx.Done():
                      return
                  }
                  continue
              }

              _, err = conn.Exec(ctx, "LISTEN outbox_new")
              if err != nil {
                  conn.Release()
                  continue
              }
              r.logger.Info("pg_notify LISTEN established")

              for {
                  notification, err := conn.Conn().WaitForNotification(ctx)
                  if err != nil {
                      r.logger.Warn("LISTEN connection lost, reconnecting", "error", err)
                      conn.Release()
                      break  // reconnect outer loop
                  }
                  notifications <- notification.Payload
              }
          }
      }
      ```

acceptance_criteria:
  - "Starting control-plane with invalid IAM_URL causes immediate startup panic with clear message"
  - "TLS: control-plane with /certs/server.crt uses ListenAndServeTLS"
  - "Rate limiter idle-IP eviction: attacker IP with 15 min of activity is NOT evicted"
  - "Policy router rejects requests >512KB with 413"
  - "SSE handler does not panic on first MongoDB event (ObjectID _id)"
  - "Outbox relay logs 'LISTEN connection lost, reconnecting' and reconnects after Postgres restart"
