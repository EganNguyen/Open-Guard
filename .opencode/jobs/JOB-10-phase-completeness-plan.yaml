id: JOB-10
title: "Phase Completeness — Gap Summary & Sequencing Plan"
priority: P0
phase_impact: [1, 2, 3, 4, 5, 6, 10]
severity: CRITICAL
type: planning
estimated_effort: 0d  # This is a tracking document, not an implementation job

summary: |
  Authoritative assessment of each phase's completeness. Use this to sequence
  work before declaring a phase "done" and before deploying to any environment.

phase_assessment:

  phase_1_infra_ci_observability:
    spec_ref: "§08 — Phase 1"
    status: "PARTIAL (60%)"
    complete:
      - "docker-compose.yml with all services, healthchecks, and infrastructure"
      - "Prometheus + Grafana + Loki + Promtail + Jaeger (docker-compose)"
      - "CI pipeline (ci.yml) with lint, build, unit test, security scan, artifact push"
      - "gen-mtls-certs.sh and create-topics.sh scripts"
      - "Makefile with basic targets"
    incomplete:
      - "Kafka topic creation on docker-compose startup (topics not auto-created) → JOB-07/INFRA-01"
      - ".env.example missing → JOB-07/INFRA-03"
      - "CI coverage gate does not exist (0 meaningful tests) → JOB-05/TEST-05"
      - "Migrate-down verification in CI missing → JOB-02/RLS-03"
      - "TLS not actually active (ListenAndServe vs ListenAndServeTLS) → JOB-09/QUAL-02"
    blockers_for_next_phase: ["Kafka topics", ".env.example", "TLS fix"]

  phase_2_foundation_and_auth:
    spec_ref: "§09 — Phase 2"
    status: "PARTIAL (70%)"
    complete:
      - "IAM service: org + user + session + refresh token migrations"
      - "JWT multi-key sign/verify (shared/crypto/jwt.go)"
      - "AES-256-GCM multi-key encrypt/decrypt (shared/crypto/aes.go)"
      - "Bcrypt password hashing via AuthWorkerPool"
      - "Account lockout after 10 failed logins (15 min lock)"
      - "TOTP MFA: setup + enable + verify"
      - "MFA challenge token flow (Redis-backed)"
      - "Token family revocation on refresh token reuse"
      - "JTI blocklist (Redis) with fail-closed auth middleware"
      - "HttpOnly Secure cookie on login response"
      - "SCIM user listing endpoints"
      - "OAuth2 authorization code flow (authorize + token endpoints)"
      - "Rate limiter on auth endpoints"
      - "Outbox writer (shared/kafka/outbox/writer.go)"
      - "Outbox relay with pg_notify + polling (shared/kafka/outbox/relay.go)"
      - "Connector CRUD in IAM + connector-registry service"
      - "SSRF guard (shared/middleware/security.go)"
      - "Circuit breakers (shared/resilience/breaker.go)"
      - "RLS migrations for all IAM tables"
    incomplete:
      - "RLS SET app.org_id never called in IAM repo → JOB-02/RLS-01 [CRITICAL]"
      - "MFA backup codes not implemented → JOB-01/SEC-05"
      - "SCIM endpoints have no authentication → SPEC-03 in JOB-08"
      - "Rate limiter uses RemoteAddr (bypassable) → JOB-01/SEC-02"
      - "Timing attack in PBKDF2 verify → JOB-01/SEC-01"
      - "Migration distributed Redis lock missing → JOB-07/INFRA-02"
      - "Connector-registry has no migrations (no schema defined)"
      - "Zero meaningful unit tests → JOB-05"
    blockers_for_next_phase: ["SEC-01", "SEC-02", "RLS-01", "backup codes"]

  phase_3_policy_engine:
    spec_ref: "§10 — Phase 3"
    status: "PARTIAL (65%)"
    complete:
      - "Policy CRUD (create/update/delete with optimistic locking via version)"
      - "Policy assignment CRUD"
      - "Two-tier cache: Redis + singleflight"
      - "Stale-while-revalidate background refresh"
      - "Org cache index for invalidation (SADD + SMEMBERS pattern)"
      - "Fail-closed on DB error (deny when policies can't be fetched)"
      - "RBAC glob matching (subjects/actions/resources with * wildcards)"
      - "Explicit deny overrides allow"
      - "Eval log writes (async)"
      - "Policy change events via outbox (atomic with policy mutation)"
      - "Prometheus metrics (evaluate duration, cache hits)"
      - "SDK with local 60s LRU cache"
    incomplete:
      - "Policy service has no auth middleware → JOB-01/SEC-04 [CRITICAL]"
      - "Policy repo set_config uses transaction-local=false → JOB-02/RLS-02"
      - "Missing policy migration .down.sql files → JOB-02/RLS-03"
      - "No policy service unit tests → JOB-05/TEST-02"
      - "SDK missing circuit breaker + retry + fail-open config → JOB-08/SPEC-02"
      - "Policy request size limit missing → JOB-09/QUAL-04"
      - "user_groups field in EvaluateRequest not included in cache key hash consistently"
    blockers_for_next_phase: ["SEC-04", "RLS-02", "tests for evaluate()"]

  phase_4_event_bus_and_audit:
    spec_ref: "§11 — Phase 4"
    status: "PARTIAL (50%)"
    complete:
      - "Audit service: Kafka consumer with manual offset commit"
      - "MongoDB BulkWrite (ordered=false)"
      - "HMAC hash chain (partial — broken under batching)"
      - "SSE streaming endpoint"
      - "Audit events REST read API"
      - "MongoDB replica set (3-node) in docker-compose"
      - "Outbox relay with pg_notify"
    incomplete:
      - "Hash chain race condition (N+1 reads, broken chain) → JOB-04/AUDIT-01 [HIGH]"
      - "No CQRS read/write split (all reads go to primary) → JOB-04/AUDIT-02"
      - "SSE uses polling not change streams → JOB-04/AUDIT-03"
      - "Audit only consumes policy.changes; missing auth.events, threat.alerts, data.access → JOB-04/AUDIT-04"
      - "SSE handler panic on ObjectID type assertion → JOB-09/QUAL-05"
      - "SSE has no auth (any client can stream any org's events) → JOB-01/SEC-03 [CRITICAL]"
      - "Kafka consumer uses eager (not cooperative-sticky) rebalancing → JOB-08/SPEC-06"
      - "Replication factor=3 fails on single-broker docker-compose → JOB-07/INFRA-01"
    blockers_for_next_phase: ["SEC-03", "AUDIT-01", "AUDIT-04"]

  phase_5_threat_and_alerting:
    spec_ref: "§12 — Phase 5"
    status: "PARTIAL (20%)"
    complete:
      - "Brute force detector: Redis-backed INCR + EXPIRE pattern"
      - "Brute force detector: Kafka consumer for auth events"
      - "Threat events stored in Redis (threat:* keys)"
      - "GET /threats endpoint (basic)"
    incomplete:
      - "Alerting service is a stub (no persistence, no saga, no SIEM) → JOB-03/STUB-01 [HIGH]"
      - "Brute force threshold = 5 (spec says configurable, default 11) → JOB-05/TEST-04"
      - "Impossible travel detector: NOT IMPLEMENTED"
      - "Off-hours access detector: NOT IMPLEMENTED"
      - "Data exfiltration detector: NOT IMPLEMENTED"
      - "Account takeover detector: NOT IMPLEMENTED"
      - "Privilege escalation detector: NOT IMPLEMENTED"
      - "Composite risk scoring: NOT IMPLEMENTED"
      - "Alert lifecycle saga: NOT IMPLEMENTED → JOB-03/STUB-01"
      - "SIEM webhook with HMAC + replay protection: NOT IMPLEMENTED → JOB-03/STUB-01"
      - "Alert CRUD API: NOT IMPLEMENTED → JOB-03/STUB-01"
      - "MTTR tracking: NOT IMPLEMENTED"
    blockers_for_next_phase: ["JOB-03 (alerting service)", "GeoLite2 DB acquisition"]
    note: |
      The 5 missing threat detectors (impossible travel, off-hours, data exfiltration,
      account takeover, privilege escalation) require a separate job. They are not
      covered by JOB-03 (which focuses on the alerting service infrastructure).
      Create JOB-11 for additional threat detector implementations.

  phase_6_compliance_and_analytics:
    spec_ref: "§13 — Phase 6"
    status: "0% (stub only)"
    complete: []
    incomplete:
      - "Compliance service is a stub → JOB-03/STUB-02"
      - "ClickHouse schema not created"
      - "Event stream → ClickHouse ingestion: NOT IMPLEMENTED"
      - "Compliance posture calculation: NOT IMPLEMENTED"
      - "Report generation (async + PDF): NOT IMPLEMENTED"
      - "Compliance API: NOT IMPLEMENTED"
      - "Frontend /compliance route: NOT IMPLEMENTED → JOB-06/FE-01"
    blockers_for_next_phase: ["JOB-03 (compliance service)"]

  phase_10_dlp:
    spec_ref: "§17 — Phase 10"
    status: "0% (stub only)"
    complete: []
    incomplete:
      - "DLP service is a stub → JOB-03/STUB-03"
      - "Regex scanner: NOT IMPLEMENTED"
      - "Entropy scanner: NOT IMPLEMENTED"
      - "DLP policy management: NOT IMPLEMENTED"
      - "Findings storage: NOT IMPLEMENTED"
      - "Frontend /dlp route: NOT IMPLEMENTED → JOB-06/FE-01"
    blockers_for_next_phase: ["JOB-03 (DLP service)"]

recommended_execution_sequence:
  week_1: ["JOB-01 (security)", "JOB-02 (RLS)"]
  week_2: ["JOB-04 (audit)", "JOB-05 (tests)"]
  week_3: ["JOB-03 (stub services)", "JOB-07 (infrastructure)"]
  week_4: ["JOB-06 (frontend)", "JOB-09 (quality)"]
  week_5: ["JOB-08 (spec updates)", "JOB-11 (additional detectors — create new job)"]

risk_register:
  - risk: "RLS not enforced in IAM → cross-tenant data leak"
    likelihood: HIGH
    impact: CRITICAL
    mitigation: "JOB-02 — block deploy until fixed"

  - risk: "Zero test coverage → regressions ship undetected"
    likelihood: HIGH
    impact: HIGH
    mitigation: "JOB-05 — add coverage gate to CI"

  - risk: "4 stub services → phases 5/6/10 cannot pass acceptance criteria"
    likelihood: CERTAIN
    impact: HIGH
    mitigation: "JOB-03 — 10 days implementation effort"

  - risk: "Hash chain race condition → audit trail corruption under load"
    likelihood: MEDIUM
    impact: CRITICAL  # Audit trail is a compliance requirement
    mitigation: "JOB-04/AUDIT-01 — fix before any compliance audit"

  - risk: "Timing attack on PBKDF2 → API key enumeration"
    likelihood: LOW
    impact: HIGH
    mitigation: "JOB-01/SEC-01 — 30 minute fix"
