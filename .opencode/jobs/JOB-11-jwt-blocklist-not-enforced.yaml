id: JOB-11
title: "JWT Blocklist Not Enforced at Middleware Layer"
priority: P0
phase_impact: [2, 3, 4, 5, 6]
severity: CRITICAL
estimated_effort: 1d

summary: |
  The spec (§1.3 — Design Principles: "Access token revocation") mandates a three-step
  JWT validation order:
    1. Verify signature
    2. Check exp / reject ErrTokenExpired
    3. Check Redis blocklist

  The shared `AuthJWT` middleware (shared/middleware/jwt_auth.go) performs only steps 1
  and 2. It never consults Redis. This means that after a user calls `POST /auth/logout`
  (which correctly writes "blocklist:{jti}" to Redis), ALL other services continue to
  accept the revoked token for the remaining lifetime of the JWT — up to 1 hour.
  This nullifies the logout endpoint and is a direct session-hijacking risk.

  Additionally, the `AuthJWT` middleware never injects the `jti` claim into the request
  context, so downstream handlers and the logout endpoint must re-parse the JWT to
  retrieve it. The IAM handler (`services/iam/pkg/handlers/handler.go:195`) calls
  `middleware.GetJTI(r.Context())` — but `GetJTI` is never populated by `AuthJWT`.
  The logout handler therefore always receives an empty JTI and silently skips
  revocation. Logout appears to succeed (HTTP 200) but does nothing.

problems:
  - id: SEC-JTI-01
    title: "AuthJWT middleware skips Redis blocklist check — revoked tokens accepted"
    file: shared/middleware/jwt_auth.go
    severity: CRITICAL
    description: |
      `AuthJWT` calls `crypto.Verify()` and, on success, immediately calls
      `next.ServeHTTP`. The Redis blocklist is never queried. A token written to
      `blocklist:{jti}` by the IAM logout path will be accepted by every other
      service (policy, audit, compliance, DLP, alerting) for up to 1 hour.

    fix: |
      1. Add `RedisClient` (or a `BlocklistChecker` interface) as a parameter to
         `AuthJWT` — or create a new `AuthJWTWithBlocklist` variant that wraps the
         existing `AuthJWT`.
      2. After `crypto.Verify()` succeeds, extract `claims.ID` (the `jti`).
      3. Call `redis.Exists(ctx, "blocklist:"+jti)`. If the key exists, return 401.
      4. Use the service's existing circuit breaker pattern for the Redis call:

         ```go
         func AuthJWTWithBlocklist(keyring []crypto.JWTKey, rdb *redis.Client,
                                   breaker *gobreaker.CircuitBreaker) func(http.Handler) http.Handler {
             return func(next http.Handler) http.Handler {
                 return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                     // ... existing token extraction and crypto.Verify() ...

                     // Step 3: blocklist check
                     jti := claims.RegisteredClaims.ID
                     revoked, err := resilience.Call(r.Context(), breaker, 50*time.Millisecond,
                         func(ctx context.Context) (interface{}, error) {
                             n, err := rdb.Exists(ctx, "blocklist:"+jti).Result()
                             return n > 0, err
                         })
                     if err == nil && revoked.(bool) {
                         http.Error(w, "Unauthorized: token revoked", http.StatusUnauthorized)
                         return
                     }
                     // On Redis failure: fail-open (log warning, allow request through)
                     // This matches the spec's "Redis unavailable → still validate signature" behavior.

                     ctx := context.WithValue(r.Context(), UserIDKey, claims.UserID)
                     ctx = context.WithValue(ctx, OrgIDKey, claims.OrgID)
                     ctx = context.WithValue(ctx, JTIKey, jti)
                     next.ServeHTTP(w, r.WithContext(ctx))
                 })
             }
         }
         ```

      5. Add `JTIKey` context key and `GetJTI(ctx)` helper to `shared/middleware/context.go`.
      6. Update all service routers to use `AuthJWTWithBlocklist` instead of `AuthJWT`.
         Each service already has a Redis client. Pass it through.
      7. Update `AuthJWT` (the no-Redis variant) to still populate `JTIKey` for services
         that handle internal-only routes without a Redis dependency.

  - id: SEC-JTI-02
    title: "Logout handler always gets empty JTI — revocation silently skipped"
    file: services/iam/pkg/handlers/handler.go
    line: 195
    severity: CRITICAL
    description: |
      `middleware.GetJTI(r.Context())` returns `""` because `AuthJWT` never stores
      the JTI in context. The handler then skips the `Logout()` call:

      ```go
      jti := middleware.GetJTI(r.Context())
      if jti != "" {  // always false → Logout() never called
          h.svc.Logout(r.Context(), jti, expiresAt)
      }
      ```

      Every call to `POST /auth/logout` returns HTTP 200 but does nothing.

    fix: |
      Fix is downstream of SEC-JTI-01. Once `AuthJWTWithBlocklist` populates `JTIKey`
      in context, the existing handler code at line 195 will work correctly.
      Additionally: if JTI is still empty after the fix, return 400 (not silent 200).

      ```go
      jti := middleware.GetJTI(r.Context())
      if jti == "" {
          http.Error(w, "invalid session: missing jti", http.StatusBadRequest)
          return
      }
      if err := h.svc.Logout(r.Context(), jti, expiresAt); err != nil {
          log.Error("logout failed", zap.Error(err))
          http.Error(w, "logout failed", http.StatusInternalServerError)
          return
      }
      ```

acceptance_criteria:
  - "POST /auth/logout followed by GET /v1/policy/evaluate using the same token returns 401"
  - "Redis key 'blocklist:{jti}' is present after logout with TTL == remaining token lifetime"
  - "With Redis unavailable, AuthJWTWithBlocklist still accepts valid non-revoked tokens (fail-open on blocklist only)"
  - "GET /auth/logout with a missing JTI in context returns 400, not 200"
  - "Unit test: mock Redis returning exists=1 → middleware returns 401"
  - "Unit test: mock Redis returning error → middleware allows request (fail-open), logs warning"

files_to_modify:
  - shared/middleware/jwt_auth.go         # Add AuthJWTWithBlocklist, populate JTIKey
  - shared/middleware/context.go          # Add JTIKey, GetJTI()
  - services/iam/pkg/handlers/handler.go  # Fix logout handler nil-JTI guard
  - services/iam/pkg/router/router.go     # Switch to AuthJWTWithBlocklist
  - services/policy/pkg/router/router.go  # Switch to AuthJWTWithBlocklist
  - services/audit/pkg/router/router.go   # Switch to AuthJWTWithBlocklist
  - services/compliance/pkg/router/router.go
  - services/dlp/pkg/router/router.go
  - services/alerting/pkg/router/router.go
