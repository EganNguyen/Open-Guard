id: JOB-12
title: "Phase 6 Compliance Service — Critical Implementation Gaps"
priority: P1
phase_impact: [6]
severity: HIGH
estimated_effort: 5d

summary: |
  Phase 6 goal per spec §14: "ClickHouse receives bulk-inserted event stream. Report
  generation is concurrency-limited via injected Bulkhead. PDF output complete and
  signed. Analytics queries meet p99 < 100ms."

  The compliance service is structurally present but fails all eight acceptance criteria
  in §14.5. Specific gaps:
    1. Batch size is 1000 (spec: 5000 rows, CLICKHOUSE_BULK_FLUSH_ROWS env var)
    2. Materialized view `event_counts_daily` never created in InitSchema
    3. `GET /v1/compliance/stats` endpoint completely absent (no handler, no route)
    4. PDF generation is `time.Sleep(10s)` + mock bytes — no real PDF, no RSA-PSS signing
    5. S3/MinIO storage not implemented — download is a fake response
    6. Bulkhead uses `semaphore.Weighted` (correct behavior) but wrong type per spec
       (spec mandates `resilience.Bulkhead` so it is injection-testable)
    7. Env var name is `COMPLIANCE_REPORT_CONCURRENCY` (code) vs
       `COMPLIANCE_REPORT_MAX_CONCURRENT` (spec §04, §14.3)
    8. `GetPosture()` returns hardcoded mock scores instead of real ClickHouse queries
    9. Compliance reports stored in ClickHouse `compliance_reports` table — but spec
       §14.3 says they belong in PostgreSQL `reports` table (with S3 key references)
    10. `SELECT ... FROM events` queries missing `FINAL` modifier (§14.2)
    11. Kafka offset committed BEFORE successful ClickHouse `batch.Send()` — data loss
        on crash between commit and send is the exact dual-write problem the spec forbids
    12. `alert_stats` table never created (required by `GET /compliance/stats`)
    13. Flush ticker is 5 seconds (spec: CLICKHOUSE_BULK_FLUSH_MS, default 2000ms)

problems:
  - id: COMP-01
    title: "Kafka offsets committed before ClickHouse batch.Send() — dual-write violation"
    file: services/compliance/pkg/consumer/clickhouse_writer.go
    severity: CRITICAL
    description: |
      In `flush()`, messages are committed to Kafka via `CommitMessages()` at line 92,
      but this commit happens regardless of whether `IngestEvents()` (the ClickHouse
      write) succeeded. If the service crashes after Kafka commit but before ClickHouse
      write, those events are permanently lost.
      
      The spec (§1.3, §2.2) is explicit: "An offset is committed only after the
      downstream write has been confirmed."

    fix: |
      ```go
      func (w *ClickHouseWriter) flush(ctx context.Context, messages []kafka.Message) {
          var events []repository.Event
          for _, m := range messages {
              var e repository.Event
              if err := json.Unmarshal(m.Value, &e); err != nil {
                  w.logger.Error("unmarshal failed", "error", err)
                  continue
              }
              events = append(events, e)
          }
          if len(events) == 0 {
              // Still commit so we don't re-process undecodable messages forever
              _ = w.reader.CommitMessages(ctx, messages...)
              return
          }
          // 1. Write to ClickHouse FIRST
          if err := w.repo.IngestEvents(ctx, events); err != nil {
              w.logger.Error("clickhouse ingest failed — NOT committing offsets", "error", err)
              return  // messages will be re-delivered on restart
          }
          // 2. Commit offsets ONLY after successful write
          if err := w.reader.CommitMessages(ctx, messages...); err != nil {
              w.logger.Error("offset commit failed after successful ingest", "error", err)
              // ClickHouse has ZSTD(3) + ReplacingMergeTree — re-delivery is idempotent
          }
      }
      ```

  - id: COMP-02
    title: "Batch size and flush interval not driven by env vars; wrong defaults"
    file: services/compliance/pkg/consumer/clickhouse_writer.go
    severity: HIGH
    description: |
      Hardcoded `batchSize := 1000` and `ticker := time.NewTicker(5 * time.Second)`.
      Spec §14.2 mandates env vars `CLICKHOUSE_BULK_FLUSH_ROWS` (default 5000) and
      `CLICKHOUSE_BULK_FLUSH_MS` (default 2000).
      Phase 6 acceptance criterion: "ClickHouse receives 10,000 events in ≤ 3 batches
      of ≤ 5,000 rows." With batchSize=1000, 10,000 events = 10 batches (criterion fails).

    fix: |
      Read env vars in `NewClickHouseWriter` or pass config struct:
      ```go
      flushRows := config.DefaultInt("CLICKHOUSE_BULK_FLUSH_ROWS", 5000)
      flushMs   := config.DefaultInt("CLICKHOUSE_BULK_FLUSH_MS", 2000)
      ticker    := time.NewTicker(time.Duration(flushMs) * time.Millisecond)
      ```
      Add `config.DefaultInt()` to shared config helpers if not already present.

  - id: COMP-03
    title: "Materialized view event_counts_daily and alert_stats table never created"
    file: services/compliance/pkg/repository/repository.go
    severity: HIGH
    description: |
      `InitSchema()` creates only `events` and `compliance_reports`. The spec requires:
      - `event_counts_daily` materialized view (SummingMergeTree) for O(1) dashboard queries
      - `alert_stats` table (SummingMergeTree) for `GET /compliance/stats` MTTR tracking

    fix: |
      Add to InitSchema() queries slice:
      ```sql
      CREATE MATERIALIZED VIEW IF NOT EXISTS event_counts_daily
      ENGINE = SummingMergeTree()
      PARTITION BY toYYYYMM(day)
      ORDER BY (org_id, type, day)
      AS SELECT org_id, type, toDate(occurred_at) AS day, count() AS cnt
      FROM events
      GROUP BY org_id, type, day;

      CREATE TABLE IF NOT EXISTS alert_stats (
          org_id       String,
          day          Date,
          severity     LowCardinality(String),
          count        UInt64,
          mttr_seconds UInt64
      ) ENGINE = SummingMergeTree(count, mttr_seconds)
      ORDER BY (org_id, day, severity);
      ```

  - id: COMP-04
    title: "GET /v1/compliance/stats endpoint missing — handler, repo, and route all absent"
    file: services/compliance/pkg/handlers/handler.go
    severity: HIGH
    description: |
      The spec (§14.4) requires `GET /v1/compliance/stats`. This is the primary
      analytics endpoint used by the frontend compliance dashboard. It is not in the
      router, handler, or repository. The Phase 6 acceptance criterion
      "`GET /compliance/stats` p99 < 100ms under load" cannot pass.

    fix: |
      1. Add `GetStats(ctx, orgID, from, to)` to repository — queries `event_counts_daily`
         (NOT `events FINAL` — this is the correct use of the materialized view):
         ```go
         func (r *Repository) GetStats(ctx context.Context, orgID string, from, to time.Time) (*Stats, error) {
             // Query event_counts_daily — no FINAL needed here
             rows, err := r.conn.Query(ctx,
                 `SELECT type, sum(cnt) as total
                  FROM event_counts_daily
                  WHERE org_id = ? AND day BETWEEN ? AND ?
                  GROUP BY type ORDER BY total DESC`,
                 orgID, from.Format("2006-01-02"), to.Format("2006-01-02"))
             // ... scan and return
         }
         ```
      2. Add `GetStats` handler method that reads `from`/`to` query params (default: last 30 days).
      3. Register `GET /v1/compliance/stats` in router.

  - id: COMP-05
    title: "GetPosture returns hardcoded scores — not real ClickHouse data"
    file: services/compliance/pkg/repository/repository.go
    severity: HIGH
    description: |
      ```go
      return map[string]float64{"GDPR": 85.5, "SOC2": 72.0, "HIPAA": 91.2}, nil
      ```
      These are fake numbers. Posture should be calculated from control compliance checks
      against actual events in the `events` table.

    fix: |
      Implement a real posture query. At minimum, compute posture from the presence and
      recency of audit events covering required controls. Example for GDPR:
      ```sql
      SELECT
          countIf(type = 'data.access.logged') as access_logs,
          countIf(type = 'consent.recorded') as consent_events,
          countIf(type = 'data.erasure.completed') as erasures
      FROM events FINAL
      WHERE org_id = ? AND occurred_at > now() - INTERVAL 30 DAY
      ```
      Score = (present_controls / total_required_controls) × 100.
      Document the control mapping in the ai-spec (§14 or a new §14.6).

  - id: COMP-06
    title: "PDF generation is a mock; no RSA-PSS signing; no S3 storage"
    file: services/compliance/pkg/handlers/handler.go
    lines: 120-133
    severity: HIGH
    description: |
      `generateReport()` sleeps for 10 seconds and then writes the download URL as a
      local path. The spec (§14.3) requires:
      1. Real PDF generation with 5 sections, ToC, and page numbers
      2. RSA-PSS signing (RSA-4096, SHA-256 hash, detached .sig file)
      3. S3/MinIO storage for both PDF and signature
      4. Pre-signed download URLs (TTL: 1 hour)
      5. PostgreSQL `reports` table (not ClickHouse) for report metadata

    fix: |
      Phase 1: Replace mock with a real PDF library. Use `github.com/jung-kurt/gofpdf`
      or `github.com/signintech/gopdf`. Generate:
      - Cover page (org name, framework, date range, report ID)
      - Table of Contents
      - Section 1: Executive Summary (event counts by category)
      - Section 2: Control Compliance (from GetPosture)
      - Section 3: Incident Summary (from alert_stats)
      - Section 4: User Access Summary
      - Section 5: Data Processing Records (GDPR) / System Changes (SOC2) / PHI Access (HIPAA)

      Phase 2: Add RSA-PSS signing:
      ```go
      // Load key from COMPLIANCE_SIGNING_KEY_ARN (AWS KMS) or COMPLIANCE_SIGNING_KEY_PATH (local PEM)
      hash := sha256.Sum256(pdfBytes)
      sig, err := rsa.SignPSS(rand.Reader, privateKey, crypto.SHA256, hash[:], nil)
      ```

      Phase 3: Upload to MinIO/S3:
      ```go
      s3Key := fmt.Sprintf("reports/%s/%s.pdf", orgID, reportID)
      s3SigKey := s3Key + ".sig"
      // Upload both; store s3Key and s3SigKey in PostgreSQL reports table
      // Generate pre-signed URL with 1 hour TTL for download
      ```

      Phase 4: Migrate compliance_reports from ClickHouse to PostgreSQL.
      Add migrations/001_create_reports.up.sql to services/compliance/migrations/.

  - id: COMP-07
    title: "compliance_reports stored in ClickHouse — spec says PostgreSQL"
    file: services/compliance/pkg/repository/repository.go
    severity: MEDIUM
    description: |
      The spec (§14.3) states report metadata (status, S3 key, signature key) belongs in
      PostgreSQL. Using ClickHouse for mutable state (status updates) is incorrect —
      ReplacingMergeTree deduplicates asynchronously, so `GetReport()` may return stale
      status. `UpdateReportStatus()` relies on this non-deterministic deduplication.

    fix: |
      1. Add a PostgreSQL connection to the compliance service (separate from ClickHouse).
      2. Create `services/compliance/migrations/001_create_reports.up.sql`:
         ```sql
         CREATE TABLE reports (
             id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
             org_id       UUID NOT NULL,
             framework    TEXT NOT NULL CHECK (framework IN ('gdpr', 'soc2', 'hipaa')),
             status       TEXT NOT NULL DEFAULT 'pending'
                          CHECK (status IN ('pending', 'generating', 'ready', 'failed')),
             s3_key       TEXT,
             s3_sig_key   TEXT,
             error_msg    TEXT,
             created_at   TIMESTAMPTZ NOT NULL DEFAULT now(),
             updated_at   TIMESTAMPTZ NOT NULL DEFAULT now()
         );
         CREATE INDEX idx_reports_org_id ON reports(org_id, created_at DESC);
         ```
      3. Update Repository to use pgxpool for report CRUD.
      4. Remove `compliance_reports` table from ClickHouse InitSchema.

  - id: COMP-08
    title: "SELECT queries missing FINAL modifier — non-deterministic results"
    file: services/compliance/pkg/repository/repository.go
    severity: MEDIUM
    description: |
      Any SELECT against `events` (ReplacingMergeTree) without FINAL may return duplicate
      rows before background merges complete. All compliance report queries targeting
      `events` must use `FINAL`. Dashboard queries against `event_counts_daily` must NOT.

    fix: |
      - All `SELECT ... FROM events WHERE ...` → `SELECT ... FROM events FINAL WHERE ...`
      - Materialized view queries (`event_counts_daily`) → no FINAL
      - Add a lint rule / code comment to enforce this invariant

  - id: COMP-09
    title: "Env var name mismatch: COMPLIANCE_REPORT_CONCURRENCY vs COMPLIANCE_REPORT_MAX_CONCURRENT"
    file: services/compliance/main.go
    line: 52
    severity: MEDIUM
    description: |
      Code reads `COMPLIANCE_REPORT_CONCURRENCY` (default 5).
      Spec §04 and §14.3 define `COMPLIANCE_REPORT_MAX_CONCURRENT` (default 10).
      .env.example uses the spec name. Operators setting the spec-documented variable
      will see no effect (the service silently uses default 5).

    fix: |
      ```go
      concurrency, _ := strconv.ParseInt(os.Getenv("COMPLIANCE_REPORT_MAX_CONCURRENT"), 10, 64)
      if concurrency == 0 {
          concurrency = 10  // spec default
      }
      ```
      Update .env.example default from 5 to 10.

  - id: COMP-10
    title: "Bulkhead type is semaphore.Weighted not resilience.Bulkhead — untestable"
    file: services/compliance/pkg/handlers/handler.go
    severity: LOW
    description: |
      The spec (§14.3) specifies `resilience.Bulkhead` injected via constructor.
      "Bulkhead is injected via constructor (not package-level). Verified in unit test."
      The current `semaphore.Weighted` is functionally equivalent but the acceptance
      criterion explicitly calls out the type. The shared `resilience` package needs a
      `Bulkhead` type that wraps `semaphore.Weighted` and returns `429` with a
      `Retry-After: 30` header when full.

    fix: |
      Add to `shared/resilience/bulkhead.go`:
      ```go
      type Bulkhead struct {
          sem *semaphore.Weighted
          cap int64
      }

      var ErrBulkheadFull = errors.New("bulkhead full")

      func NewBulkhead(capacity int) *Bulkhead {
          return &Bulkhead{sem: semaphore.NewWeighted(int64(capacity)), cap: int64(capacity)}
      }

      func (b *Bulkhead) Execute(ctx context.Context, fn func() error) error {
          if !b.sem.TryAcquire(1) {
              return ErrBulkheadFull
          }
          defer b.sem.Release(1)
          return fn()
      }
      ```
      Update `ComplianceHandler` to accept `*resilience.Bulkhead`.
      In `CreateReport`, when `bulkhead.Execute()` returns `ErrBulkheadFull`, respond
      with `429` and `Retry-After: 30` header.

acceptance_criteria:
  - "10,000 events ingested in ≤ 3 Kafka batches of ≤ 5,000 rows each"
  - "Kafka offsets committed ONLY after successful clickhouse batch.Send()"
  - "Materialized view event_counts_daily populated automatically on event insert"
  - "GET /v1/compliance/stats returns real data, p99 < 100ms under load"
  - "GDPR/SOC2/HIPAA reports: real PDF with 5 sections, ToC, and page numbers"
  - "PDF has RSA-PSS detached signature; verification with public key passes"
  - "11 concurrent report requests: 10 succeed, 11th returns 429 with Retry-After: 30"
  - "Bulkhead is resilience.Bulkhead injected via constructor; verified in unit test"
  - "Report metadata in PostgreSQL; S3 presigned download URLs (1h TTL)"
  - "COMPLIANCE_REPORT_MAX_CONCURRENT env var controls concurrency (default 10)"
  - "All SELECT against events table use FINAL modifier"

