id: JOB-14
title: "SDK — Fail-Closed Not Implemented, Memory Leak, Circuit Breaker Stub"
priority: P1
phase_impact: [3]
severity: HIGH
estimated_effort: 2d

summary: |
  The Go SDK (`sdk/`) is the primary integration surface for connected applications.
  Three serious defects exist:

  1. **Fail-Closed is not implemented.** The spec (§1.3) states: "Policy unavailable →
     SDK denies after 60s cache TTL." When `c.do()` returns an error (policy service
     unreachable), `Allow()` currently propagates that error to the caller — returning
     `(false, err)`. This is superficially correct but incomplete. The spec requires
     that if there IS a cached value (even an expired one) and the network is down,
     the SDK should serve from cache for the remaining 60s TTL then deny — not
     immediately error. If there is NO cached value and the service is down, the SDK
     must return `(false, nil)` (deny without error) when `failOpen=false`. The current
     code returns `(false, err)` which causes callers to mishandle the "deny" case
     (they may log errors or treat it as an unknown failure rather than a policy deny).

  2. **Memory leak in localCache.** The `localCache` struct has no eviction goroutine.
     Every unique `(subjectID, action, resource)` triple is written to the map and never
     removed after expiry (only lazily on next `Get()`). In a long-running SDK client
     serving many distinct users and resources, this grows unbounded. At 10,000 active
     users × 5 typical actions × 3 resources = 150,000 entries permanently resident.

  3. **`WithCircuitBreaker` and `WithRetry` are no-op stubs.** Both option functions
     contain only a comment "Implementation will be added in Phase 3." Phase 3 is
     complete. These options are part of the public API and silently do nothing, giving
     callers a false sense of resilience.

problems:
  - id: SDK-01
    title: "Fail-closed behavior is missing — network error returns (false, err) not (false, nil)"
    file: sdk/policy.go
    severity: HIGH
    description: |
      Current code:
      ```go
      err := c.do(ctx, "POST", "/v1/policy/evaluate", req, &resp)
      if err != nil {
          return false, err   // BUG: should be (false, nil) when failOpen=false
      }
      ```

      Correct behavior per spec:
      - `failOpen=false` (default): network error → return `(false, nil)` — deny silently
      - `failOpen=true`: network error → return `(true, nil)` — allow (permissive mode for dev)
      - In both cases: if the cache had an entry that just expired, extend it by 60s
        during the outage window (grace period) then deny permanently after that

    fix: |
      ```go
      func (c *Client) Allow(ctx context.Context, subjectID, action, resource string) (bool, error) {
          cacheKey := fmt.Sprintf("%s:%s:%s", subjectID, action, resource)

          // Check cache — including grace period (stale-while-unavailable)
          if val, ok := c.cache.GetOrStale(cacheKey); ok {
              return val, nil
          }

          req := EvaluationRequest{SubjectID: subjectID, Action: action, Resource: resource}
          var resp EvaluationResponse
          err := c.do(ctx, "POST", "/v1/policy/evaluate", req, &resp)
          if err != nil {
              // Policy service unavailable — apply fail-closed behavior
              if c.failOpen {
                  return true, nil   // fail-open (dev mode)
              }
              return false, nil      // fail-closed (production default) — deny, no error
          }

          c.cache.Set(cacheKey, resp.Allowed)
          return resp.Allowed, nil
      }
      ```

      Update `localCache` to support `GetOrStale(key)` — returns the stale value if
      the entry has expired within the last 60 seconds (grace period for outage):
      ```go
      func (c *localCache) GetOrStale(key string) (bool, bool) {
          c.mu.RLock()
          defer c.mu.RUnlock()
          entry, ok := c.data[key]
          if !ok {
              return false, false
          }
          if time.Now().Before(entry.expiresAt) {
              return entry.value, true  // fresh hit
          }
          // Stale: check grace period (60s after expiry)
          if time.Now().Before(entry.expiresAt.Add(60 * time.Second)) {
              return entry.value, true  // grace hit — serve stale during outage
          }
          return false, false  // expired beyond grace period — deny
      }
      ```

  - id: SDK-02
    title: "localCache has no eviction goroutine — unbounded memory growth"
    file: sdk/cache.go
    severity: HIGH
    description: |
      The `data map[string]cacheEntry` grows indefinitely. Expired entries are only
      removed on `Get()` for the same key. Keys for users that logged out or resources
      that no longer exist are never cleaned up.

    fix: |
      Add a background eviction goroutine started in `newLocalCache()`:
      ```go
      func newLocalCache(ttl time.Duration) *localCache {
          c := &localCache{
              data: make(map[string]cacheEntry),
              ttl:  ttl,
              done: make(chan struct{}),
          }
          go c.evictionLoop()
          return c
      }

      func (c *localCache) evictionLoop() {
          ticker := time.NewTicker(c.ttl / 2)  // evict every 30s for 60s TTL
          defer ticker.Stop()
          for {
              select {
              case <-c.done:
                  return
              case <-ticker.C:
                  now := time.Now()
                  // Grace period: keep until expiry + 60s (for stale-while-unavailable)
                  cutoff := now.Add(-60 * time.Second)
                  c.mu.Lock()
                  for k, v := range c.data {
                      if v.expiresAt.Before(cutoff) {
                          delete(c.data, k)
                      }
                  }
                  c.mu.Unlock()
              }
          }
      }

      func (c *localCache) Close() {
          close(c.done)
      }
      ```
      Add `Close()` to the `Client` and call it in a defer or when SDK is shut down.

  - id: SDK-03
    title: "WithCircuitBreaker and WithRetry are no-op stubs"
    file: sdk/client.go
    lines: 22-32
    severity: MEDIUM
    description: |
      ```go
      func WithCircuitBreaker(threshold int, timeout time.Duration) ClientOption {
          return func(c *Client) {
              // Implementation will be added in Phase 3
          }
      }
      ```
      Callers who configure these options in production get no circuit breaking or retry.
      The SDK will hammer a failing policy service with repeated requests.

    fix: |
      1. Add `github.com/sony/gobreaker` and an internal retry loop to the SDK:
         ```go
         type Client struct {
             baseURL    string
             apiKey     string
             httpClient *http.Client
             cache      *localCache
             failOpen   bool
             breaker    *gobreaker.CircuitBreaker  // nil = no circuit breaker
             retryMax   int                        // 0 = no retry
             retryDelay time.Duration
         }

         func WithCircuitBreaker(threshold int, timeout time.Duration) ClientOption {
             return func(c *Client) {
                 c.breaker = gobreaker.NewCircuitBreaker(gobreaker.Settings{
                     Name:        "openguard-policy",
                     MaxRequests: uint32(threshold),
                     Timeout:     timeout,
                     ReadyToTrip: func(counts gobreaker.Counts) bool {
                         return counts.ConsecutiveFailures >= uint32(threshold)
                     },
                 })
             }
         }

         func WithRetry(attempts int, delay time.Duration) ClientOption {
             return func(c *Client) {
                 c.retryMax   = attempts
                 c.retryDelay = delay
             }
         }
         ```
      2. Update `c.do()` to use the breaker and retry loop.

  - id: SDK-04
    title: "SDK cache TTL is hardcoded at 60s — not configurable via env or constructor"
    file: sdk/client.go
    line: 23
    severity: LOW
    description: |
      `newLocalCache(60 * time.Second)` is hardcoded. The spec says "caches decisions
      locally for up to 60 seconds during control plane unavailability" — this is a
      maximum, not a fixed value. Operators may want shorter TTL for rapid policy changes.

    fix: |
      Add `WithCacheTTL(ttl time.Duration) ClientOption`:
      ```go
      func WithCacheTTL(ttl time.Duration) ClientOption {
          return func(c *Client) { c.cache.ttl = ttl }
      }
      ```
      Default remains 60s. Document in SDK README that values above 60s are not
      recommended (reduces security responsiveness of policy changes).

acceptance_criteria:
  - "Allow() with policy service down and failOpen=false returns (false, nil) — not (false, err)"
  - "Allow() with policy service down and failOpen=true returns (true, nil)"
  - "Stale cache entry within 60s grace period served during outage; beyond 60s → deny"
  - "localCache eviction goroutine removes entries with expired + 60s grace after each tick"
  - "cache.Close() stops the eviction goroutine (no goroutine leak)"
  - "WithCircuitBreaker configured with threshold=3 → breaker opens after 3 consecutive failures"
  - "WithRetry configured with attempts=2 → retried once before returning cached/fail-closed value"
  - "10,000 unique cache entries then Close() → all entries GC'd within one eviction tick"

files_to_modify:
  - sdk/policy.go    # Fail-closed logic, GetOrStale
  - sdk/cache.go     # Eviction goroutine, GetOrStale, Close()
  - sdk/client.go    # Circuit breaker, retry, WithCacheTTL, Close()
  - sdk/README.md    # Document fail-closed behavior and cache TTL semantics
