id: JOB-17
title: "Spec Deviations — PBKDF2 Hash Algorithm, SCIM Saga, CI Coverage Gate, Missing Audit Topics"
priority: P1
phase_impact: [2, 4]
severity: HIGH
estimated_effort: 3d

summary: |
  A collection of spec deviations that each individually affect a critical system property:
  security of API key verification (PBKDF2 algorithm), correctness of user provisioning
  (SCIM saga), CI integrity (coverage gate too low), and audit completeness (missing topics).

problems:
  - id: DEV-01
    title: "PBKDF2 uses SHA-256 but spec requires PBKDF2-HMAC-SHA512 with 600,000 iterations"
    file: shared/middleware/apikey.go
    lines: 130, 162
    severity: HIGH
    description: |
      The spec §2.6 explicitly states the full credential flow:
      "PBKDF2-HMAC-SHA512(key, salt, 600000) → lookup DB by pbkdf2_hash"
      
      The implementation uses `sha256.New` (not SHA-512) and the stored hash format
      indicates `pbkdf2$sha256$...` — the wrong algorithm. The connector-registry
      service creates API keys using the same algorithm pattern as middleware expects,
      so this is a consistent deviation, but it means:
      1. The security strength is lower than specified (SHA-512 is stronger for PBKDF2)
      2. Any external tooling that reads the spec to verify stored hashes will fail
      3. If the connector-registry uses SHA-512 and the middleware expects SHA-256
         (or vice versa) after a future fix, all existing API keys become invalid

      Additionally: `verifyPBKDF2` returns false for `iterations < 100000`.
      The spec default is 600,000. An old key hashed at 100,001 iterations would pass
      this guard but is well below spec strength.

    fix: |
      1. Update `derivePBKDF2()` in `shared/middleware/apikey.go`:
         ```go
         import "crypto/sha512"
         
         func derivePBKDF2(key, saltHex string, iterations int) string {
             salt, err := hex.DecodeString(saltHex)
             if err != nil {
                 return ""
             }
             // spec §2.6: PBKDF2-HMAC-SHA512, 600,000 iterations, 64-byte output
             hash := pbkdf2.Key([]byte(key), salt, iterations, 64, sha512.New)
             return hex.EncodeToString(hash)
         }
         ```
      2. Update stored hash format string from `pbkdf2$sha256$...` to `pbkdf2$sha512$...`
         in both middleware parser and connector-registry key generation.
      3. Update `verifyPBKDF2` guard from `< 100000` to `< 600000`:
         ```go
         if iterations < 600000 {
             return false  // reject any key below spec minimum
         }
         ```
      4. Update connector-registry key generation (`services/connector-registry/`) to use
         SHA-512, 600,000 iterations, 64-byte output.
      5. Add a migration note in the admin runbook: existing API keys generated before
         this fix must be regenerated (force-rotate). The connector-registry `POST
         /v1/admin/connectors/rotate` endpoint should handle this.

  - id: DEV-02
    title: "SCIM saga (user provisioning choreography) not implemented"
    file: services/iam/pkg/service/service.go (missing saga logic)
    severity: HIGH
    description: |
      Spec §2.5 defines a detailed SCIM provisioning saga:
      ```
      IAM: user.created (status=initializing) → audit.trail + saga.orchestration
      Policy: assigns default org policies
      Threat: initializes baseline profile
      Alerting: configures notification preferences
      IAM: consumes alert.prefs.init → UPDATE users SET status='active'
      ```
      
      This choreography is completely absent. When SCIM creates a user:
      1. No `status='initializing'` is set (users go directly to 'active')
      2. No `user.created` event is published to `saga.orchestration` topic
      3. IAM does not reject logins for users in `initializing` state
      4. Saga timeout (40s deadline written to Redis) is not implemented
      5. Saga watcher daemon is not implemented
      6. `POST /users/:id/reprovision` endpoint does not exist
      7. Compensation events (policy.assignment.failed) are not consumed

    fix: |
      Phase 1 — Minimum viable saga state:
      1. Add `status TEXT NOT NULL DEFAULT 'initializing'` to users table migration.
         Run `services/iam/migrations/XXX_add_user_status.up.sql`.
      2. In `RegisterUser()` (or SCIM handler): create user with `status='initializing'`.
      3. In `Login()`: check `user["status"]`. If `== "initializing"`, return 403 with
         code `USER_PROVISIONING_IN_PROGRESS`.
      4. Publish `user.created` to `saga.orchestration` Kafka topic after user insert
         (via Transactional Outbox — same pattern as other events).
      
      Phase 2 — Full choreography:
      5. Policy service: consume `user.created` → assign default org policies →
         publish `policy.assigned`.
      6. Threat service: consume `policy.assigned` → initialize baseline →
         publish `threat.baseline.init`.
      7. Alerting service: consume `threat.baseline.init` → configure preferences →
         publish `alert.prefs.init`.
      8. IAM: consume `alert.prefs.init` → `UPDATE users SET status='active'` →
         publish `saga.completed`.
      9. Saga timeout: on `user.created`, write
         `ZADD saga:deadlines <now+40s> <saga_id>` to Redis.
         Add background watcher goroutine in IAM that polls every 10s for expired sagas.
      10. Add `POST /v1/users/:id/reprovision` endpoint.
      
      The user status state machine must exactly match spec §2.5:
      initializing → active | provisioning_failed → initializing (retry)
      active → suspended → active
      any → deprovisioned

  - id: DEV-03
    title: "CI coverage gate is 60% — spec mandates 80% on business logic"
    file: .github/workflows/ci.yml
    line: 103
    severity: MEDIUM
    description: |
      The spec (§00 Code Quality Standards) states:
      "80% unit test coverage on business logic (service layer, not handler/repository)."
      
      The CI gate is `total < 60`. Combined with JOB-05 (near-zero real tests currently),
      the CI gate gives a false sense of security. Even after JOB-05 work completes,
      the gate should enforce the spec-mandated threshold.

    fix: |
      1. Raise coverage gate threshold to 80:
         ```bash
         if [ "$(echo "$total < 80" | bc -l)" -eq 1 ]; then
             echo "Coverage $total% is below 80% minimum"
             exit 1
         fi
         ```
      2. Add `-tags=!integration` to unit test run to exclude integration tests from
         the coverage calculation (they run in a separate CI step with real services).
      3. Add a `//go:build integration` build tag to integration test files so they
         are excluded from `-short` runs.
      4. Consider per-package gates: `service` packages at 80%, `handler` and
         `repository` packages at 60% (these are harder to unit test without DB/HTTP).
         Use `go tool cover -func` output to check per-package coverage.

  - id: DEV-04
    title: "Audit consumer missing 'audit.trail' topic — internal events not self-audited"
    file: services/audit/main.go
    lines: 88-94
    severity: MEDIUM
    description: |
      The audit service consumes from: `auth.events`, `policy.changes`, `data.access`,
      `threat.alerts`, `connector.events`.
      
      Missing: `audit.trail` itself. The spec states that the outbox relay publishes
      all internal service events to `audit.trail` (IAM login/logout, SCIM operations,
      policy CRUD). The audit service writing consumers should also subscribe to
      `audit.trail` to capture these events into MongoDB.
      
      Also missing: `saga.orchestration` (saga step events need to be audited per spec
      §2.5 — each saga step must produce an audit event).

    fix: |
      Add missing topics to the consumer list:
      ```go
      topics := []string{
          "auth.events",
          "policy.changes",
          "data.access",
          "threat.alerts",
          "connector.events",
          "audit.trail",          // internal service events from outbox relay
          "saga.orchestration",   // saga step events (spec §2.5)
      }
      ```
      
      Note: consuming from `audit.trail` while also being the service that writes TO
      `audit.trail` (via the MongoDB write path) creates a fan-out: events written by
      IAM go to `audit.trail` → audit consumer reads them → writes to MongoDB.
      This is the correct pattern. The audit consumer group ID (`audit-service-audit.trail`)
      will only process each message once.

  - id: DEV-05
    title: "CI missing SAST (gosec/semgrep) and SBOM generation"
    file: .github/workflows/ci.yml
    severity: MEDIUM
    description: |
      The spec (§08 Phase 1: CI) includes security scanning. The current CI runs:
      - govulncheck (dependency scan) ✅
      - Trivy filesystem scan ✅
      Missing:
      - gosec (Go SAST — finds hardcoded credentials, SQL injection, etc.) ❌
      - semgrep (cross-language pattern matching for security issues) ❌
      - SBOM generation (syft/cyclonedx — required for supply chain transparency) ❌
      - go.sum verification (`go mod verify`) ❌

    fix: |
      Add to the `security-and-dependencies` CI job:
      ```yaml
      - name: SAST (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go list -m -f '{{.Dir}}' | xargs -L1 -I {} sh -c \
            'cd {} && if find . -name "*.go" | grep -q ".go"; then gosec ./...; fi'

      - name: Go module verification
        run: go mod verify  # detects tampered dependencies

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json
      ```

  - id: DEV-06
    title: "go.work references go 1.25.0 — does not exist (as of April 2026, latest stable is 1.24.x)"
    file: go.work
    line: 1
    severity: LOW
    description: |
      `go 1.25.0` in go.work will cause `go build` failures on any toolchain earlier
      than 1.25.0. Go 1.25 is not released (as of April 2026). This is likely a
      speculative/accidental version bump.

    fix: |
      Update go.work to the latest stable release:
      ```
      go 1.23.0
      ```
      Or the specific version required by the project. Check `go version` in CI and
      match it. If the CI uses `go-version: '1.22'` (as in ci.yml line 16), change
      go.work to `go 1.22.0` to avoid version skew.

acceptance_criteria:
  - "All connector API keys use PBKDF2-HMAC-SHA512 with 600,000 iterations and 64-byte output"
  - "verifyPBKDF2 rejects keys with iterations < 600,000"
  - "SCIM POST /v1/scim/v2/Users creates user with status=initializing"
  - "Login with status=initializing returns 403 with USER_PROVISIONING_IN_PROGRESS"
  - "user.created event published to saga.orchestration topic on SCIM user creation"
  - "CI coverage gate fails build when total coverage < 80%"
  - "Audit consumer subscribes to audit.trail and saga.orchestration topics"
  - "CI runs gosec SAST and fails on CRITICAL findings"
  - "CI generates SBOM artifact in cyclonedx-json format"
  - "go.work go directive matches the Go version in CI (1.22.x or later stable)"

