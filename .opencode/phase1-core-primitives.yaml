# Phase 1: Core Primitives
# OpenGuard — Foundation types, interfaces, and shared utilities
# Used by all subsequent phases

spec_version: "1.0"
phase: 1
name: core-primitives
description: >
  Foundational data structures, enums, interfaces, and pure utility
  functions shared across BE and FE packages. No runtime dependencies
  on Express, React, or Node — fully isomorphic.

# ─────────────────────────────────────────────
# ENUMS
# ─────────────────────────────────────────────
enums:
  - name: GuardAction
    values:
      - ALLOW
      - BLOCK
      - CHALLENGE
      - LOG_ONLY
      - RATE_LIMIT

  - name: ThreatLevel
    values:
      - NONE
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL

  - name: DetectorKind
    values:
      - RATE_LIMIT
      - SQL_INJECTION
      - XSS
      - CSRF
      - BOT
      - ANOMALY
      - GEO_BLOCK
      - IP_REPUTATION
      - PAYLOAD_SIZE
      - AUTH_BRUTE_FORCE
      - HEADER_INJECTION
      - PATH_TRAVERSAL

  - name: RuleOperator
    values:
      - AND
      - OR
      - NOT

# ─────────────────────────────────────────────
# INTERFACES
# ─────────────────────────────────────────────
interfaces:
  - name: GuardRequest
    description: Normalized request object passed to all detectors
    fields:
      - name: id
        type: string
        required: true
        description: Unique request ID (UUID v4)
      - name: ip
        type: string
        required: true
      - name: method
        type: string
        enum: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
      - name: path
        type: string
        required: true
      - name: query
        type: Record<string, string | string[]>
      - name: headers
        type: Record<string, string>
        required: true
      - name: body
        type: unknown
        required: false
      - name: timestamp
        type: number
        description: Unix ms
        required: true
      - name: userId
        type: string
        required: false
      - name: sessionId
        type: string
        required: false
      - name: geo
        type: GeoInfo
        required: false

  - name: GeoInfo
    fields:
      - name: country
        type: string
      - name: region
        type: string
      - name: city
        type: string
      - name: lat
        type: number
      - name: lon
        type: number
      - name: asn
        type: string

  - name: DetectorResult
    description: Output from any single detector
    fields:
      - name: detectorId
        type: string
        required: true
      - name: kind
        type: DetectorKind
        required: true
      - name: action
        type: GuardAction
        required: true
      - name: threatLevel
        type: ThreatLevel
        required: true
      - name: score
        type: number
        description: 0.0 – 1.0 confidence
        required: true
      - name: reason
        type: string
        required: true
      - name: metadata
        type: Record<string, unknown>
        required: false
      - name: durationMs
        type: number
        description: Time taken to evaluate

  - name: GuardResponse
    description: Final aggregated result after all detectors run
    fields:
      - name: requestId
        type: string
      - name: action
        type: GuardAction
      - name: threatLevel
        type: ThreatLevel
      - name: results
        type: DetectorResult[]
      - name: durationMs
        type: number
      - name: blockedBy
        type: string
        required: false
        description: Name of first blocking detector

  - name: GuardConfig
    description: Root configuration passed to OpenGuard init
    fields:
      - name: mode
        type: string
        enum: [enforce, monitor, dry_run]
        default: enforce
      - name: detectors
        type: DetectorConfig[]
      - name: store
        type: StoreAdapter
      - name: logger
        type: LoggerAdapter
        required: false
      - name: onBlock
        type: "(req: GuardRequest, res: GuardResponse) => void"
        required: false

  - name: DetectorConfig
    fields:
      - name: id
        type: string
        required: true
      - name: kind
        type: DetectorKind
        required: true
      - name: enabled
        type: boolean
        default: true
      - name: priority
        type: number
        default: 100
        description: Lower = runs first
      - name: options
        type: Record<string, unknown>
        description: Detector-specific config

  - name: StoreAdapter
    description: Pluggable storage interface (Redis, Memory, Upstash, etc.)
    methods:
      - name: get
        params: [key: string]
        returns: "Promise<string | null>"
      - name: set
        params: [key: string, value: string, ttlSeconds?: number]
        returns: Promise<void>
      - name: incr
        params: [key: string, ttlSeconds?: number]
        returns: Promise<number>
      - name: del
        params: [key: string]
        returns: Promise<void>

  - name: LoggerAdapter
    methods:
      - name: info
        params: [msg: string, meta?: Record<string, unknown>]
      - name: warn
        params: [msg: string, meta?: Record<string, unknown>]
      - name: error
        params: [msg: string, meta?: Record<string, unknown>]

# ─────────────────────────────────────────────
# UTILITIES
# ─────────────────────────────────────────────
utilities:
  - name: normalizeRequest
    description: Convert Express/Fetch/Node req → GuardRequest
    signature: "(raw: unknown, platform: 'express' | 'fetch' | 'node') => GuardRequest"

  - name: scoreToThreatLevel
    description: Map numeric score to ThreatLevel enum
    signature: "(score: number) => ThreatLevel"
    logic:
      - "score >= 0.9 → CRITICAL"
      - "score >= 0.7 → HIGH"
      - "score >= 0.5 → MEDIUM"
      - "score >= 0.2 → LOW"
      - "else → NONE"

  - name: mergeResults
    description: Aggregate multiple DetectorResults into a single GuardResponse
    signature: "(results: DetectorResult[], requestId: string) => GuardResponse"
    logic:
      - Take highest threatLevel across all results
      - Action = most restrictive (BLOCK > CHALLENGE > RATE_LIMIT > LOG_ONLY > ALLOW)
      - Sum durationMs

  - name: generateRequestId
    signature: "() => string"
    description: UUID v4 generator (crypto.randomUUID if available, fallback manual)

# ─────────────────────────────────────────────
# ERRORS
# ─────────────────────────────────────────────
errors:
  - name: OpenGuardError
    extends: Error
    fields:
      - name: code
        type: string
      - name: phase
        type: number
      - name: detectorId
        type: string
        required: false

  - name: DetectorTimeoutError
    extends: OpenGuardError
    code: DETECTOR_TIMEOUT

  - name: StoreConnectionError
    extends: OpenGuardError
    code: STORE_CONNECTION_FAILED

# ─────────────────────────────────────────────
# FILE OUTPUTS
# ─────────────────────────────────────────────
outputs:
  - path: packages/core/src/types.ts
    generates: [enums, interfaces]
  - path: packages/core/src/utils.ts
    generates: [utilities]
  - path: packages/core/src/errors.ts
    generates: [errors]
  - path: packages/core/src/index.ts
    generates: [barrel_export]
