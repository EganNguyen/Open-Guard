# Phase 2: Backend Middleware
# OpenGuard — Express / Node / Edge middleware layer

spec_version: "1.0"
phase: 2
name: backend-middleware
description: >
  Express-compatible middleware chain that runs the detector pipeline,
  handles store interactions, emits events, and enforces guard actions
  on incoming HTTP requests.

depends_on: [phase_1]

# ─────────────────────────────────────────────
# MIDDLEWARE PIPELINE
# ─────────────────────────────────────────────
pipeline:
  name: OpenGuardMiddleware
  description: >
    Main middleware factory. Returns an Express RequestHandler.
    Internally runs all enabled detectors in priority order,
    merges results, then enforces the final action.

  factory_function:
    name: openGuard
    signature: "(config: GuardConfig) => RequestHandler"

  execution_flow:
    - step: normalize
      description: Convert raw Express req → GuardRequest
      uses: normalizeRequest(req, 'express')

    - step: run_detectors
      description: Execute all enabled detectors in parallel (unless sequential=true)
      strategy: parallel
      timeout_ms: 5000
      on_timeout: LOG_ONLY
      error_handling: >
        Individual detector errors are caught, logged, and that detector
        result is set to ALLOW with a warning. Never crash the pipeline.

    - step: merge
      description: Aggregate all DetectorResults → GuardResponse
      uses: mergeResults()

    - step: enforce
      description: Act on the final GuardResponse
      actions:
        ALLOW: "next()"
        BLOCK:
          status: 403
          body: "{ error: 'Blocked by OpenGuard', requestId, reason }"
        CHALLENGE:
          status: 429
          body: "{ error: 'Challenge required', challengeToken }"
        RATE_LIMIT:
          status: 429
          headers:
            Retry-After: "{ttl}"
            X-RateLimit-Limit: "{limit}"
            X-RateLimit-Remaining: "0"
          body: "{ error: 'Rate limit exceeded', retryAfter }"
        LOG_ONLY: "next() — but log and emit event"

    - step: emit
      description: Emit guard:result event via EventEmitter
      event: guard:result
      payload: GuardResponse

# ─────────────────────────────────────────────
# STORE ADAPTERS (built-in)
# ─────────────────────────────────────────────
store_adapters:
  - name: MemoryStore
    description: In-process Map-based store. Dev/testing only. Not distributed.
    implements: StoreAdapter
    options:
      - name: maxKeys
        type: number
        default: 10000

  - name: RedisStore
    description: Redis-backed store via ioredis
    implements: StoreAdapter
    options:
      - name: client
        type: Redis
        description: ioredis client instance
      - name: keyPrefix
        type: string
        default: "og:"

  - name: UpstashStore
    description: Upstash REST API store for edge/serverless
    implements: StoreAdapter
    options:
      - name: url
        type: string
        env: UPSTASH_REDIS_REST_URL
      - name: token
        type: string
        env: UPSTASH_REDIS_REST_TOKEN

# ─────────────────────────────────────────────
# EVENT SYSTEM
# ─────────────────────────────────────────────
events:
  emitter: OpenGuardEventEmitter
  extends: EventEmitter

  event_types:
    - name: "guard:result"
      payload: GuardResponse
      description: Fired after every request evaluation

    - name: "guard:block"
      payload: "{ request: GuardRequest, response: GuardResponse }"
      description: Fired only when action = BLOCK

    - name: "guard:error"
      payload: "{ detectorId: string, error: Error, request: GuardRequest }"
      description: Fired when a detector throws

    - name: "guard:ratelimit"
      payload: "{ request: GuardRequest, detectorId: string, ttl: number }"

# ─────────────────────────────────────────────
# RATE LIMIT STORE KEYS
# ─────────────────────────────────────────────
store_key_schema:
  - pattern: "og:rl:{detectorId}:{ip}"
    description: Per-IP rate limit counter
    ttl: window_seconds

  - pattern: "og:rl:{detectorId}:{userId}"
    description: Per-user rate limit counter
    ttl: window_seconds

  - pattern: "og:bf:{detectorId}:{ip}"
    description: Brute force attempt counter
    ttl: lockout_seconds

  - pattern: "og:bl:ip:{ip}"
    description: Manually blocked IP (permanent)
    ttl: null

  - pattern: "og:wl:ip:{ip}"
    description: Allowlisted IP (permanent)
    ttl: null

# ─────────────────────────────────────────────
# RESPONSE HEADERS
# ─────────────────────────────────────────────
response_headers:
  always:
    - X-Guard-Request-Id: "{requestId}"
  on_block:
    - X-Guard-Blocked-By: "{detectorId}"
  on_rate_limit:
    - Retry-After: "{ttlSeconds}"
    - X-RateLimit-Limit: "{limit}"
    - X-RateLimit-Remaining: "0"
    - X-RateLimit-Reset: "{resetTimestamp}"

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
outputs:
  - path: packages/middleware/src/openGuard.ts
    generates: [pipeline, factory_function]
  - path: packages/middleware/src/enforce.ts
    generates: [enforce_logic]
  - path: packages/middleware/src/events.ts
    generates: [event_system]
  - path: packages/middleware/src/stores/memory.ts
    generates: [MemoryStore]
  - path: packages/middleware/src/stores/redis.ts
    generates: [RedisStore]
  - path: packages/middleware/src/stores/upstash.ts
    generates: [UpstashStore]
  - path: packages/middleware/src/index.ts
    generates: [barrel_export]
