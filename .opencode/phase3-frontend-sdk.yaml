# Phase 3: Frontend SDK
# OpenGuard — Browser-side client for reporting, monitoring, and challenge handling

spec_version: "1.0"
phase: 3
name: frontend-sdk
description: >
  Isomorphic TypeScript SDK consumed in React/Next.js/Vue apps.
  Provides: guard event reporting, challenge flow UI hooks,
  real-time WebSocket subscription to guard events, and
  a React context/provider for dashboard integration.

depends_on: [phase_1]

# ─────────────────────────────────────────────
# SDK CLIENT
# ─────────────────────────────────────────────
client:
  name: OpenGuardClient
  description: Main browser client class

  constructor_options:
    - name: baseUrl
      type: string
      required: true
      description: URL of the OpenGuard reporting endpoint

    - name: apiKey
      type: string
      required: false
      description: Optional API key for authenticated reporting

    - name: websocketUrl
      type: string
      required: false
      description: WS endpoint for live event streaming

    - name: autoReport
      type: boolean
      default: true
      description: Automatically report fetch/XHR errors to guard

    - name: onChallenge
      type: "(challenge: ChallengePayload) => Promise<string>"
      required: false
      description: Custom challenge resolver (CAPTCHA, 2FA, etc.)

  methods:
    - name: report
      description: Manually report a client-side guard event
      signature: "(event: ClientGuardEvent) => Promise<void>"

    - name: subscribe
      description: Subscribe to real-time guard events via WebSocket
      signature: "(handler: (event: GuardStreamEvent) => void) => Unsubscribe"

    - name: resolveChallenge
      description: Handle a 429 CHALLENGE response
      signature: "(response: Response) => Promise<boolean>"

    - name: getStats
      description: Fetch aggregated stats from the guard API
      signature: "(filters?: StatsFilter) => Promise<GuardStats>"

    - name: blockIp
      description: Manually block an IP via admin API
      signature: "(ip: string, reason?: string) => Promise<void>"

    - name: allowlistIp
      description: Allowlist an IP
      signature: "(ip: string) => Promise<void>"

# ─────────────────────────────────────────────
# INTERFACES
# ─────────────────────────────────────────────
interfaces:
  - name: ClientGuardEvent
    fields:
      - name: type
        type: string
        enum: [fetch_blocked, challenge_shown, challenge_passed, manual_report]
      - name: url
        type: string
      - name: statusCode
        type: number
      - name: requestId
        type: string
        required: false
      - name: timestamp
        type: number

  - name: GuardStreamEvent
    description: Real-time event received over WebSocket
    fields:
      - name: type
        type: string
        enum: [block, allow, rate_limit, challenge, error]
      - name: requestId
        type: string
      - name: ip
        type: string
      - name: path
        type: string
      - name: detectorId
        type: string
      - name: threatLevel
        type: ThreatLevel
      - name: timestamp
        type: number

  - name: GuardStats
    fields:
      - name: totalRequests
        type: number
      - name: blockedRequests
        type: number
      - name: rateLimitedRequests
        type: number
      - name: challengedRequests
        type: number
      - name: topThreats
        type: ThreatSummary[]
      - name: topBlockedIps
        type: IpSummary[]
      - name: timeline
        type: TimelinePoint[]

  - name: ThreatSummary
    fields:
      - name: detectorId
        type: string
      - name: kind
        type: DetectorKind
      - name: count
        type: number
      - name: percentage
        type: number

  - name: StatsFilter
    fields:
      - name: from
        type: number
        description: Unix ms
      - name: to
        type: number
      - name: detectorIds
        type: string[]
      - name: actions
        type: GuardAction[]

  - name: ChallengePayload
    fields:
      - name: token
        type: string
      - name: type
        type: string
        enum: [captcha, totp, email_otp]
      - name: expiresAt
        type: number

# ─────────────────────────────────────────────
# REACT HOOKS
# ─────────────────────────────────────────────
react_hooks:
  - name: useGuardStats
    description: Fetch and auto-refresh guard stats
    signature: "(filters?: StatsFilter, refreshIntervalMs?: number) => { stats: GuardStats | null, loading: boolean, error: Error | null }"
    behavior:
      - Calls client.getStats() on mount
      - Refreshes every refreshIntervalMs (default 30000)
      - Returns loading state during fetch

  - name: useGuardStream
    description: Subscribe to real-time guard events
    signature: "(handler: (event: GuardStreamEvent) => void) => { connected: boolean }"
    behavior:
      - Opens WebSocket on mount
      - Closes on unmount
      - Reconnects with exponential backoff on disconnect

  - name: useGuardChallenge
    description: Handle challenge flows automatically
    signature: "() => { pendingChallenge: ChallengePayload | null, resolve: (token: string) => void, dismiss: () => void }"

# ─────────────────────────────────────────────
# REACT CONTEXT / PROVIDER
# ─────────────────────────────────────────────
react_context:
  name: GuardProvider
  description: Wraps app to provide OpenGuardClient via context
  props:
    - name: client
      type: OpenGuardClient
      required: true
    - name: children
      type: ReactNode

  exposes_hook:
    name: useGuard
    returns: OpenGuardClient

# ─────────────────────────────────────────────
# FETCH INTERCEPTOR
# ─────────────────────────────────────────────
fetch_interceptor:
  name: installGuardInterceptor
  description: >
    Patches global fetch to auto-detect 403/429 guard responses,
    report them to the client, and optionally invoke challenge flow.
  signature: "(client: OpenGuardClient) => () => void"
  behavior:
    - Wraps window.fetch
    - On 403: calls client.report({ type: 'fetch_blocked', ... })
    - On 429 with X-Guard challenge header: calls client.resolveChallenge()
    - Returns cleanup function to restore original fetch

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────
outputs:
  - path: packages/sdk/src/client.ts
    generates: [OpenGuardClient]
  - path: packages/sdk/src/types.ts
    generates: [interfaces]
  - path: packages/sdk/src/hooks/useGuardStats.ts
    generates: [useGuardStats]
  - path: packages/sdk/src/hooks/useGuardStream.ts
    generates: [useGuardStream]
  - path: packages/sdk/src/hooks/useGuardChallenge.ts
    generates: [useGuardChallenge]
  - path: packages/sdk/src/context.tsx
    generates: [GuardProvider, useGuard]
  - path: packages/sdk/src/interceptor.ts
    generates: [fetch_interceptor]
  - path: packages/sdk/src/index.ts
    generates: [barrel_export]
