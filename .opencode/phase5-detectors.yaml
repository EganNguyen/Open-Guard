# Phase 5: Detectors & Logic
# OpenGuard — OpenCode YAML Spec for all security detectors
# This is the PRIMARY file consumed by the OpenCode Generator

spec_version: "1.0"
phase: 5
name: detectors
description: >
  Complete detector definitions for OpenCode generator.
  Each detector is a self-contained unit: config schema,
  evaluation logic, scoring rules, store interactions, and tests.

depends_on: [phase_1, phase_2]

generator:
  engine: opencode/v1
  output_dir: packages/detectors/src
  test_dir: packages/detectors/src/__tests__
  template: detector-class

# ─────────────────────────────────────────────
# BASE DETECTOR CONTRACT
# ─────────────────────────────────────────────
base_detector:
  name: BaseDetector
  description: Abstract base class all detectors extend
  abstract: true
  constructor: "(config: DetectorConfig, store: StoreAdapter)"
  abstract_methods:
    - name: evaluate
      signature: "(req: GuardRequest) => Promise<DetectorResult>"
  concrete_methods:
    - name: buildResult
      description: Helper to construct DetectorResult with defaults
      signature: "(partial: Partial<DetectorResult>) => DetectorResult"
    - name: getStoreKey
      signature: "(namespace: string, ...parts: string[]) => string"
      logic: "return `og:${namespace}:${parts.join(':')}` "
    - name: isEnabled
      signature: "() => boolean"

# ─────────────────────────────────────────────
# DETECTOR 1 — RATE LIMITER
# ─────────────────────────────────────────────
detectors:
  - id: rate-limiter
    class: RateLimitDetector
    kind: RATE_LIMIT
    priority: 10
    description: >
      Sliding-window rate limiter. Counts requests per IP (and optionally
      per userId) within a configurable window. Supports multiple tiers
      (warn at 80%, block at 100%).

    config_schema:
      - name: windowSeconds
        type: number
        default: 60
        description: Sliding window duration in seconds

      - name: maxRequests
        type: number
        default: 100
        description: Max requests allowed in window

      - name: keyBy
        type: string[]
        enum: [ip, userId, sessionId]
        default: [ip]
        description: Dimensions to rate-limit by (combined key)

      - name: warnAt
        type: number
        default: 0.8
        description: Fraction of maxRequests that triggers LOG_ONLY warning

      - name: skipPaths
        type: string[]
        default: []
        description: Glob patterns to skip (e.g. /health, /favicon.ico)

      - name: skipIps
        type: string[]
        default: []
        description: CIDR ranges or exact IPs to skip

    logic:
      algorithm: sliding_window_counter
      steps:
        - Build store key from keyBy dimensions
        - Atomically INCR counter with TTL = windowSeconds
        - If counter > maxRequests → action = RATE_LIMIT, score = 1.0
        - If counter > maxRequests * warnAt → action = LOG_ONLY, score = counter/maxRequests
        - Else → action = ALLOW, score = 0.0
        - Store remaining = max(0, maxRequests - counter) in result metadata

    result_metadata:
      - remaining: number
      - limit: number
      - resetAt: number (unix ms)
      - windowSeconds: number

    tests:
      - name: "allows requests under limit"
        setup: counter = 50, maxRequests = 100
        expect: action = ALLOW

      - name: "logs warning at 80%"
        setup: counter = 82, maxRequests = 100
        expect: action = LOG_ONLY

      - name: "blocks at limit"
        setup: counter = 101, maxRequests = 100
        expect: action = RATE_LIMIT, score = 1.0

      - name: "skips configured paths"
        setup: path = /health
        expect: action = ALLOW (not evaluated)

# ─────────────────────────────────────────────
  - id: sql-injection
    class: SqlInjectionDetector
    kind: SQL_INJECTION
    priority: 20
    description: >
      Pattern-based SQL injection detector. Inspects query params,
      request body, and path segments for SQLi payloads. Scores
      by number of pattern matches and confidence weights.

    config_schema:
      - name: inspectBody
        type: boolean
        default: true
      - name: inspectQuery
        type: boolean
        default: true
      - name: inspectPath
        type: boolean
        default: true
      - name: sensitivity
        type: string
        enum: [low, medium, high]
        default: medium
      - name: customPatterns
        type: string[]
        default: []
        description: Additional regex patterns to append

    patterns:
      - id: union_select
        regex: "(?i)(union\\s+(all\\s+)?select)"
        weight: 0.9
        description: UNION SELECT injection

      - id: comment_bypass
        regex: "(?i)(/\\*|\\*/|--\\s|#\\s)"
        weight: 0.6
        description: SQL comment sequences

      - id: boolean_blind
        regex: "(?i)(\\bor\\b\\s+\\d+\\s*=\\s*\\d+|\\band\\b\\s+\\d+\\s*=\\s*\\d+)"
        weight: 0.8
        description: Boolean blind injection patterns

      - id: time_blind
        regex: "(?i)(sleep\\s*\\(|waitfor\\s+delay|benchmark\\s*\\()"
        weight: 0.95
        description: Time-based blind injection

      - id: stacked_query
        regex: "(?i)(;\\s*(drop|insert|update|delete|create|alter)\\b)"
        weight: 0.95
        description: Stacked queries

      - id: quote_escape
        regex: "('\\s*(or|and)\\s*'|'\\s*=\\s*'|\\\\x27)"
        weight: 0.7
        description: Quote manipulation

      - id: function_calls
        regex: "(?i)(char\\s*\\(|ascii\\s*\\(|substring\\s*\\(|hex\\s*\\(|unhex\\s*\\()"
        weight: 0.5
        description: SQL function abuse

    scoring:
      algorithm: weighted_sum
      formula: "min(1.0, sum(matched_pattern.weight * sensitivity_multiplier))"
      sensitivity_multipliers:
        low: 0.7
        medium: 1.0
        high: 1.3
      thresholds:
        block: 0.8
        log_only: 0.4

    logic:
      steps:
        - Collect inspection targets based on config flags
        - Flatten nested objects to string values
        - Run each pattern regex against all string values
        - Accumulate weighted score
        - Determine action by threshold
        - Populate metadata with matched pattern IDs

    result_metadata:
      - matchedPatterns: string[]
      - inspectedFields: string[]
      - rawScore: number

    tests:
      - name: "detects UNION SELECT"
        input: "query.search = \"1 UNION SELECT * FROM users\""
        expect: action = BLOCK, matchedPatterns includes union_select

      - name: "allows clean input"
        input: "query.search = \"hello world\""
        expect: action = ALLOW, score = 0.0

      - name: "detects time-blind"
        input: "body.name = \"'; SLEEP(5);--\""
        expect: action = BLOCK

# ─────────────────────────────────────────────
  - id: xss
    class: XssDetector
    kind: XSS
    priority: 25
    description: >
      Cross-site scripting detector. Scans query params and request
      body for reflected/stored XSS payloads using signature patterns
      and entropy scoring.

    config_schema:
      - name: inspectBody
        type: boolean
        default: true
      - name: inspectQuery
        type: boolean
        default: true
      - name: sensitivity
        type: string
        enum: [low, medium, high]
        default: medium
      - name: decodeEntities
        type: boolean
        default: true
        description: Decode HTML entities before scanning

    patterns:
      - id: script_tag
        regex: "(?i)<script[\\s>]"
        weight: 0.95

      - id: event_handler
        regex: "(?i)\\bon\\w+\\s*="
        weight: 0.8
        description: onerror=, onclick=, etc.

      - id: javascript_uri
        regex: "(?i)javascript\\s*:"
        weight: 0.9

      - id: data_uri
        regex: "(?i)data\\s*:[^,]*base64"
        weight: 0.7

      - id: vbscript
        regex: "(?i)vbscript\\s*:"
        weight: 0.9

      - id: svg_xss
        regex: "(?i)<svg[\\s>].*?(onload|onerror)"
        weight: 0.95

      - id: template_injection
        regex: "\\{\\{.*?\\}\\}|\\{%.*?%\\}"
        weight: 0.6
        description: Template injection (Jinja, Handlebars, etc.)

      - id: encoded_angle
        regex: "(%3C|&lt;|&#60;).*?(%3E|&gt;|&#62;)"
        weight: 0.7
        description: Encoded angle brackets

    scoring:
      algorithm: weighted_sum
      thresholds:
        block: 0.75
        log_only: 0.35

    logic:
      steps:
        - If decodeEntities=true, HTML-decode all values first
        - Run pattern matching
        - Score and threshold

# ─────────────────────────────────────────────
  - id: csrf
    class: CsrfDetector
    kind: CSRF
    priority: 30
    description: >
      CSRF token validation for state-mutating requests.
      Checks the configured header or cookie token against
      the server-side session token stored in the store.

    config_schema:
      - name: methods
        type: string[]
        default: [POST, PUT, PATCH, DELETE]
        description: HTTP methods to enforce CSRF on

      - name: tokenHeader
        type: string
        default: "x-csrf-token"

      - name: tokenCookie
        type: string
        default: "_csrf"

      - name: skipPaths
        type: string[]
        default: ["/api/auth/login", "/api/webhooks/*"]

      - name: doubleSubmitCookie
        type: boolean
        default: false
        description: Use double-submit cookie pattern instead of server-side lookup

    logic:
      steps:
        - Skip if method not in config.methods
        - Skip if path matches skipPaths glob
        - Extract token from header (tokenHeader)
        - If doubleSubmitCookie=false:
            - Lookup expected token from store key og:csrf:{sessionId}
            - Compare tokens (constant-time comparison)
        - If doubleSubmitCookie=true:
            - Compare header token with cookie token
        - If mismatch or missing → action = BLOCK, score = 1.0, threatLevel = HIGH

    result_metadata:
      - tokenPresent: boolean
      - tokenSource: "header | cookie | none"
      - validationMethod: "server_session | double_submit"

# ─────────────────────────────────────────────
  - id: bot-detection
    class: BotDetector
    kind: BOT
    priority: 40
    description: >
      Heuristic bot detection using User-Agent analysis, header
      fingerprinting, request timing patterns, and optional
      behavioral scoring from external honeypot signals.

    config_schema:
      - name: blockKnownBots
        type: boolean
        default: false
        description: Block requests matching known bad-bot UA signatures

      - name: allowKnownGoodBots
        type: boolean
        default: true
        description: Allow Googlebot, Bingbot, etc. even if suspicious

      - name: challengeSuspicious
        type: boolean
        default: true

      - name: minHeaderCount
        type: number
        default: 4
        description: Browsers typically send 8+ headers; low count is suspicious

      - name: suspiciousUaPatterns
        type: string[]
        default: []
        description: Additional UA regex patterns to treat as suspicious

    known_bad_bot_signatures:
      - "(?i)(scrapy|python-requests|go-http-client|curl/|wget/|libwww-perl)"
      - "(?i)(masscan|nikto|nmap|sqlmap|dirbuster|gobuster)"
      - "(?i)(zgrab|nuclei|httpie)"

    known_good_bots:
      - "Googlebot"
      - "Bingbot"
      - "Slurp"
      - "DuckDuckBot"
      - "Baiduspider"
      - "facebookexternalhit"
      - "Twitterbot"

    scoring:
      signals:
        - name: missing_ua
          score: 0.8
          condition: "User-Agent header is missing"

        - name: known_bad_bot
          score: 0.95
          condition: "UA matches known bad bot pattern"

        - name: known_good_bot
          score: -0.5
          condition: "UA matches known good bot (reduces score)"

        - name: low_header_count
          score: 0.4
          condition: "header count < minHeaderCount"

        - name: missing_accept
          score: 0.3
          condition: "Accept header is missing"

        - name: missing_accept_language
          score: 0.25
          condition: "Accept-Language is missing"

        - name: headless_markers
          score: 0.7
          condition: "UA contains HeadlessChrome or Phantom"

      final_score: "min(1.0, max(0.0, sum(matched_signals)))"
      thresholds:
        block: 0.9
        challenge: 0.5
        log_only: 0.3

# ─────────────────────────────────────────────
  - id: geo-block
    class: GeoBlockDetector
    kind: GEO_BLOCK
    priority: 50
    description: >
      Block or challenge requests from specific countries/regions.
      Uses geo data from GuardRequest.geo (populated by IP lookup middleware).

    config_schema:
      - name: blockedCountries
        type: string[]
        default: []
        description: ISO 3166-1 alpha-2 country codes to block

      - name: allowedCountries
        type: string[]
        default: []
        description: If set, ONLY these countries are allowed (allowlist mode)

      - name: challengedCountries
        type: string[]
        default: []
        description: Countries to challenge rather than block

      - name: actionOnMissingGeo
        type: string
        enum: [ALLOW, BLOCK, LOG_ONLY]
        default: ALLOW
        description: Action when geo data is unavailable

    logic:
      steps:
        - If geo data unavailable → return actionOnMissingGeo
        - If allowedCountries is set and country NOT in list → BLOCK
        - If country in blockedCountries → BLOCK
        - If country in challengedCountries → CHALLENGE
        - Else → ALLOW

# ─────────────────────────────────────────────
  - id: ip-reputation
    class: IpReputationDetector
    kind: IP_REPUTATION
    priority: 55
    description: >
      Checks the request IP against manually maintained block/allowlists
      in the store and optionally against an external IP reputation API.

    config_schema:
      - name: externalApiUrl
        type: string
        required: false
        description: Optional external IP reputation API endpoint

      - name: externalApiKey
        type: string
        required: false
        env: GUARD_IP_REPUTATION_API_KEY

      - name: cacheHitsTtlSeconds
        type: number
        default: 3600
        description: Cache external API results for this duration

      - name: blockOnApiError
        type: boolean
        default: false

    logic:
      steps:
        - Check store for og:wl:ip:{ip} → if found, return ALLOW with score=0
        - Check store for og:bl:ip:{ip} → if found, return BLOCK with score=1.0
        - If externalApiUrl configured:
            - Check store cache og:ipr:{ip}
            - If miss, call external API
            - Cache result for cacheHitsTtlSeconds
            - Map API response to score
        - Return result

    result_metadata:
      - source: "allowlist | blocklist | external | none"
      - externalProvider: string
      - cachedResult: boolean

# ─────────────────────────────────────────────
  - id: payload-size
    class: PayloadSizeDetector
    kind: PAYLOAD_SIZE
    priority: 5
    description: >
      Blocks requests exceeding configured payload size limits.
      Runs first (priority 5) to prevent DoS via large payloads.

    config_schema:
      - name: maxBodyBytes
        type: number
        default: 1048576
        description: "1MB default"

      - name: maxUrlLength
        type: number
        default: 2048

      - name: maxHeaderValueLength
        type: number
        default: 8192

      - name: skipMethods
        type: string[]
        default: [GET, HEAD, OPTIONS]

    logic:
      steps:
        - Skip if method in skipMethods
        - Check Content-Length header or body byte length
        - Check full URL length (path + query)
        - Check each header value length
        - If any limit exceeded → BLOCK, score=1.0, include which limit was exceeded

    result_metadata:
      - exceededLimit: "body | url | header"
      - actualBytes: number
      - limitBytes: number

# ─────────────────────────────────────────────
  - id: auth-brute-force
    class: AuthBruteForceDetector
    kind: AUTH_BRUTE_FORCE
    priority: 15
    description: >
      Detects credential stuffing and brute-force login attempts by
      counting failed authentications per IP and per username within
      a sliding window. Supports progressive lockout.

    config_schema:
      - name: watchPaths
        type: string[]
        default: ["/auth/login", "/api/login", "/sign-in"]
        description: Paths to monitor for brute force

      - name: watchMethods
        type: string[]
        default: [POST]

      - name: maxAttemptsPerIp
        type: number
        default: 10

      - name: maxAttemptsPerUser
        type: number
        default: 5

      - name: windowSeconds
        type: number
        default: 300
        description: 5 minute window

      - name: lockoutSeconds
        type: number
        default: 900
        description: 15 minute lockout after exceeding limit

      - name: progressiveLockout
        type: boolean
        default: true
        description: Double lockout duration on repeat offenses

      - name: failureStatusCodes
        type: number[]
        default: [401, 403]
        description: Status codes from upstream that count as failures

    logic:
      steps:
        - Skip if path not in watchPaths or method not in watchMethods
        - This detector runs in two modes:
          PRE_REQUEST:
            - Check og:bf:ip:{ip} counter
            - If counter > maxAttemptsPerIp → BLOCK (lockout active)
          POST_RESPONSE (hook called after upstream):
            - If response.statusCode in failureStatusCodes:
                - INCR og:bf:ip:{ip} with TTL windowSeconds
                - INCR og:bf:user:{username} with TTL windowSeconds
                - Check if new counter exceeds limit → trigger lockout

    result_metadata:
      - attemptsIp: number
      - attemptsUser: number
      - lockoutRemainingSeconds: number

# ─────────────────────────────────────────────
  - id: header-injection
    class: HeaderInjectionDetector
    kind: HEADER_INJECTION
    priority: 22
    description: >
      Detects HTTP header injection via CRLF sequences in headers,
      query params, and body. Also checks for Host header spoofing.

    config_schema:
      - name: allowedHosts
        type: string[]
        default: []
        description: If set, block requests with Host not in this list
      - name: inspectQuery
        type: boolean
        default: true
      - name: inspectBody
        type: boolean
        default: false

    patterns:
      - id: crlf
        regex: "(%0d%0a|%0a%0d|\\r\\n|\\r|\\n)"
        weight: 0.95
        description: CRLF injection

      - id: null_byte
        regex: "(%00|\\x00)"
        weight: 0.8
        description: Null byte injection

      - id: header_split
        regex: "(%0d|%0a|\\\\r|\\\\n)"
        weight: 0.85

    logic:
      steps:
        - Check all header values for CRLF/null patterns
        - If inspectQuery=true, check query params
        - If allowedHosts set, check Host header matches
        - Score and threshold

# ─────────────────────────────────────────────
  - id: path-traversal
    class: PathTraversalDetector
    kind: PATH_TRAVERSAL
    priority: 18
    description: >
      Detects directory traversal attacks in URL paths and query params.

    config_schema:
      - name: inspectQuery
        type: boolean
        default: true
      - name: decodePercent
        type: boolean
        default: true

    patterns:
      - id: dotdot_slash
        regex: "\\.\\./|\\.\\.\\\\"
        weight: 0.9

      - id: encoded_dotdot
        regex: "(%2e%2e%2f|%2e%2e/|\\.%2e/|%2e\\./)"
        weight: 0.95

      - id: double_encoded
        regex: "(%252e%252e)"
        weight: 0.95

      - id: absolute_path
        regex: "^/?(etc/passwd|etc/shadow|windows/system32)"
        weight: 0.99

    logic:
      steps:
        - If decodePercent=true, percent-decode path and query before scanning
        - Run pattern matching on decoded path
        - If inspectQuery=true, also scan query values
        - Score and threshold (block at 0.7)

# ─────────────────────────────────────────────
  - id: anomaly
    class: AnomalyDetector
    kind: ANOMALY
    priority: 80
    description: >
      Statistical anomaly detector that baselines request patterns
      per IP (request rate, method distribution, path entropy) and
      flags deviations beyond configured sigma thresholds.
      Runs last (priority 80) as it's computationally heavier.

    config_schema:
      - name: baselineWindowSeconds
        type: number
        default: 3600
        description: Window for computing baseline stats

      - name: minSamplesForBaseline
        type: number
        default: 20
        description: Minimum requests before anomaly detection activates

      - name: rateDeviationSigma
        type: number
        default: 3.0
        description: Standard deviations from mean rate to flag

      - name: pathEntropyThreshold
        type: number
        default: 0.9
        description: Shannon entropy threshold for path randomness (scanning)

      - name: enabled
        type: boolean
        default: false
        description: Off by default — computationally expensive

    signals:
      - name: request_rate_spike
        description: Requests/minute exceeds mean + N*sigma
        weight: 0.6

      - name: method_anomaly
        description: Unusual method distribution (e.g. 90% HEAD)
        weight: 0.4

      - name: high_path_entropy
        description: Very high path entropy suggests scanning
        weight: 0.7

      - name: new_ip_burst
        description: IP seen for first time making many requests
        weight: 0.5

    logic:
      steps:
        - Load baseline stats for IP from store
        - If sample count < minSamplesForBaseline → ALLOW (building baseline)
        - Compute current request rate
        - Compare against baseline (z-score)
        - Compute path entropy for recent paths
        - Aggregate signal scores
        - Update baseline stats in store

# ─────────────────────────────────────────────
# DETECTOR REGISTRY
# ─────────────────────────────────────────────
registry:
  description: >
    The DetectorRegistry resolves detector IDs to class instances.
    OpenCode should generate this from the detectors list above.
  built_in_detectors:
    - id: rate-limiter
      class: RateLimitDetector
    - id: sql-injection
      class: SqlInjectionDetector
    - id: xss
      class: XssDetector
    - id: csrf
      class: CsrfDetector
    - id: bot-detection
      class: BotDetector
    - id: geo-block
      class: GeoBlockDetector
    - id: ip-reputation
      class: IpReputationDetector
    - id: payload-size
      class: PayloadSizeDetector
    - id: auth-brute-force
      class: AuthBruteForceDetector
    - id: header-injection
      class: HeaderInjectionDetector
    - id: path-traversal
      class: PathTraversalDetector
    - id: anomaly
      class: AnomalyDetector

# ─────────────────────────────────────────────
# OUTPUTS (OpenCode generator targets)
# ─────────────────────────────────────────────
outputs:
  - path: packages/detectors/src/base/BaseDetector.ts
    generates: [base_detector]

  - path: packages/detectors/src/RateLimitDetector.ts
    generates: [rate-limiter]

  - path: packages/detectors/src/SqlInjectionDetector.ts
    generates: [sql-injection]

  - path: packages/detectors/src/XssDetector.ts
    generates: [xss]

  - path: packages/detectors/src/CsrfDetector.ts
    generates: [csrf]

  - path: packages/detectors/src/BotDetector.ts
    generates: [bot-detection]

  - path: packages/detectors/src/GeoBlockDetector.ts
    generates: [geo-block]

  - path: packages/detectors/src/IpReputationDetector.ts
    generates: [ip-reputation]

  - path: packages/detectors/src/PayloadSizeDetector.ts
    generates: [payload-size]

  - path: packages/detectors/src/AuthBruteForceDetector.ts
    generates: [auth-brute-force]

  - path: packages/detectors/src/HeaderInjectionDetector.ts
    generates: [header-injection]

  - path: packages/detectors/src/PathTraversalDetector.ts
    generates: [path-traversal]

  - path: packages/detectors/src/AnomalyDetector.ts
    generates: [anomaly]

  - path: packages/detectors/src/registry.ts
    generates: [registry]

  - path: packages/detectors/src/index.ts
    generates: [barrel_export]

  - path: packages/detectors/src/__tests__/RateLimitDetector.test.ts
    generates: [rate-limiter.tests]

  - path: packages/detectors/src/__tests__/SqlInjectionDetector.test.ts
    generates: [sql-injection.tests]
