version: '3.8'

services:
  todo-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: todoapp
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - todo-db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - POSTGRES_URL=postgres://postgres:postgres@todo-db:5432/todoapp?sslmode=disable
      - OPENGUARD_URL=http://control-plane:8080
      - TODO_OPENGUARD_API_KEY=${TODO_OPENGUARD_API_KEY}
      - OPENGUARD_WEBHOOK_SECRET=test-webhook-secret
      - OPENGUARD_OIDC_ISSUER=http://iam:8081
      - OPENGUARD_OIDC_CLIENT_ID=todo-app
      - OPENGUARD_OIDC_CLIENT_SECRET=todo-app-secret
      - FRONTEND_URL=http://localhost:8082
      - SDK_EVENT_BATCH_SIZE=100
      - SDK_EVENT_FLUSH_INTERVAL_MS=2000
    depends_on:
      - todo-db

volumes:
  todo-db-data:
