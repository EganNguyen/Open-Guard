version: '3.8'

services:
  todo-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: todoapp
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - todo-db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - services_default

  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - POSTGRES_URL=postgres://postgres:postgres@todo-db:5432/todoapp?sslmode=disable
      - OPENGUARD_URL=http://openguard-controlplane:8080
      - TODO_OPENGUARD_API_KEY=${TODO_OPENGUARD_API_KEY:-}
      - OPENGUARD_WEBHOOK_SECRET=test-webhook-secret
      - OPENGUARD_OIDC_ISSUER=http://openguard-iam:8081
      - OPENGUARD_OIDC_CLIENT_ID=todo-app
      - OPENGUARD_OIDC_CLIENT_SECRET=todo-app-secret
      - FRONTEND_URL=http://localhost:8083
      - SDK_EVENT_BATCH_SIZE=100
      - SDK_EVENT_FLUSH_INTERVAL_MS=2000
    depends_on:
      - todo-db
    networks:
      - services_default

volumes:
  todo-db-data:

networks:
  services_default:
    external: true
