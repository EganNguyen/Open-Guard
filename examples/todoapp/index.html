<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGuard Todo — Secure Task Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --error: #ef4444;
            --success: #22c55e;
            --glass: rgba(24, 24, 27, 0.8);
        }
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg) 80%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 540px;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -0.025em;
        }
        .header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-section {
            margin-bottom: 2rem;
            text-align: center;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            background: var(--surface);
        }
        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.875rem 1rem;
            color: var(--text);
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .todo-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .todo-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .completed .checkbox {
            background: var(--success);
            border-color: var(--success);
        }
        .completed .todo-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }
        .status-msg {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            display: none;
        }
        .status-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); display: block; }
        .status-success { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.2); display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Secure Todo</h1>
        <p>Protected by OpenGuard Enterprise Control Plane</p>
    </div>

    <div class="card">
        <div id="authSection" class="auth-section">
            <button id="loginBtn" class="btn-primary" onclick="login()">Login with OpenGuard IAM</button>
        </div>

        <div id="appSection" style="display: none;">
            <div id="statusMsg" class="status-msg"></div>

            <form id="addForm" class="input-group">
                <input type="text" id="todoInput" placeholder="Add a secure task..." required />
                <button type="submit" class="btn-primary" style="width: auto;">Add</button>
            </form>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="margin: 0; font-size: 1.1rem;">Tasks</h3>
                <button class="btn-outline" onclick="fetchTodos()">Refresh</button>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Todos loaded via JS -->
            </ul>

            <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1rem; display: flex; justify-content: space-between; align-items: center;">
                <span id="userInfo" style="font-size: 0.85rem; color: var(--text-muted);"></span>
                <button class="btn-outline" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "/api/v1/todos";
    const AUTH_URL = "/auth/login";

    const authSection = document.getElementById('authSection');
    const appSection = document.getElementById('appSection');
    const statusMsg = document.getElementById('statusMsg');
    const todoList = document.getElementById('todoList');
    const userInfo = document.getElementById('userInfo');

    // 1. Initial State Check
    window.onload = () => {
        const token = localStorage.getItem('access_token');
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('access_token');

        if (urlToken) {
            localStorage.setItem('access_token', urlToken);
            window.history.replaceState({}, document.title, window.location.pathname);
            showApp();
        } else if (token) {
            showApp();
        }
    };

    function login() {
        window.location.href = AUTH_URL;
    }

    function logout() {
        localStorage.removeItem('access_token');
        authSection.style.display = 'block';
        appSection.style.display = 'none';
    }

    function showApp() {
        authSection.style.display = 'none';
        appSection.style.display = 'block';
        fetchTodos();
    }

    function showStatus(msg, isError = false) {
        statusMsg.textContent = msg;
        statusMsg.className = `status-msg ${isError ? 'status-error' : 'status-success'}`;
        setTimeout(() => statusMsg.style.display = 'none', 5000);
    }

    async function fetchTodos() {
        const token = localStorage.getItem('access_token');
        try {
            const res = await fetch(API_URL, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) return logout();
            if (!res.ok) throw new Error(await res.text());

            const todos = await res.json();
            todoList.innerHTML = todos.map(t => `
                <li class="todo-item ${t.completed ? 'completed' : ''}">
                    <div class="todo-content">
                        <div class="checkbox" onclick="toggleTodo('${t.id}', ${!t.completed})"></div>
                        <span class="todo-text">${t.title}</span>
                    </div>
                    <button class="btn-outline" style="border: none; color: var(--error);" onclick="deleteTodo('${t.id}')">Delete</button>
                </li>
            `).join('');
            
            if (todos.length > 0) {
                userInfo.textContent = `Connected to Org: ${todos[0].org_id.substring(0, 8)}...`;
            }
        } catch (err) {
            showStatus(err.message, true);
        }
    }

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        const input = document.getElementById('todoInput');
        const token = localStorage.getItem('access_token');

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title: input.value })
            });

            if (!res.ok) {
                const errData = await res.text();
                // Surface DLP violation or policy denial
                throw new Error(errData);
            }

            input.value = '';
            showStatus('Task secured and saved');
            fetchTodos();
        } catch (err) {
            showStatus(err.message, true);
        }
    };

    async function toggleTodo(id, completed) {
        const token = localStorage.getItem('access_token');
        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'PATCH',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ completed })
            });
            if (!res.ok) throw new Error(await res.text());
            fetchTodos();
        } catch (err) {
            showStatus(err.message, true);
        }
    }

    async function deleteTodo(id) {
        const token = localStorage.getItem('access_token');
        try {
            const res = await fetch(`${API_URL}/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error(await res.text());
            fetchTodos();
        } catch (err) {
            showStatus(err.message, true);
        }
    }
</script>
</body>
</html>
