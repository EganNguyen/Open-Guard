<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGuard TodoApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --error: #f85149;
            --success: #3fb950;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            color: #fff;
            margin: 0 0 0.5rem 0;
        }
        .header p {
            color: #8b949e;
            margin: 0;
            font-size: 0.9rem;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .target-url {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .target-url input {
            flex: 1;
        }
        ul.todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        ul.todo-list li {
            padding: 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        .status.error {
            display: block;
            background: rgba(248, 81, 73, 0.1);
            color: var(--error);
            border: 1px solid rgba(248, 81, 73, 0.4);
        }
        .status.success {
            display: block;
            background: rgba(63, 185, 80, 0.1);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Todo App</h1>
        <p>SDK Integration with OpenGuard Control Plane</p>
    </div>

    <!-- Configuration Panel -->
    <div class="panel">
        <div class="form-group">
            <label>API Endpoint (Todo App)</label>
            <div class="target-url">
                <input type="text" id="apiUrl" value="http://localhost:8082/api/v1/todos" readonly />
            </div>
            <p style="font-size: 0.8rem; color: #8b949e; margin-top: 0.5rem;">
                Requests hit the App directly. The App will evaluate policies against the Control Plane.
            </p>
        </div>
        
        <div class="form-group">
            <label>Bearer Token (Issued by OpenGuard IAM)</label>
            <input type="text" id="jwtToken" placeholder="eyJhbG..." />
        </div>
    </div>

    <div id="statusAlert" class="status"></div>

    <!-- Add Todo Panel -->
    <div class="panel">
        <form id="addForm">
            <div class="form-group" style="margin-bottom: 0;">
                <label>New Task (Requires 'write' policy)</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="todoTitle" placeholder="What needs doing?" required />
                    <button type="submit" style="width: auto;">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Todo List -->
    <div class="panel">
        <h3 style="margin-top: 0; font-size: 1rem; color: #fff;">Your Tasks (Requires 'read' policy)</h3>
        <div style="text-align: right; margin-bottom: 1rem;">
            <button onclick="fetchTodos()" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.8rem; background: var(--border);">🔄 Refresh</button>
        </div>
        <ul class="todo-list" id="todoList">
            <!-- Rendered by JS -->
            <li style="color: #8b949e; justify-content: center; border: none; background: transparent;">Hit refresh to load tasks...</li>
        </ul>
    </div>

</div>

<script>
    const DASHBOARD_URL = "http://localhost:3000";
    const IAM_URL = "https://localhost:8081";

    // 1. Handle callback from OpenGuard Login
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('access_token');
    const urlRefresh = urlParams.get('refresh_token');

    if (urlToken && urlRefresh) {
        localStorage.setItem('access_token', urlToken);
        localStorage.setItem('refresh_token', urlRefresh);
        // Clean up URL
        window.history.replaceState({}, document.title, window.location.pathname);
        showStatus("Logged in via OpenGuard!", false);
    }

    // 2. Check Auth State and Redirect if needed
    function checkAuth() {
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = `${DASHBOARD_URL}/login?redirect_uri=${encodeURIComponent(window.location.href)}`;
            return false;
        }
        document.getElementById('jwtToken').value = token;
        return true;
    }

    // 3. Silent Refresh Logic
    async function silentRefresh() {
        const refreshToken = localStorage.getItem('refresh_token');
        if (!refreshToken) return;

        try {
            const res = await fetch(`${IAM_URL}/api/v1/auth/refresh`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh_token: refreshToken })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('access_token', data.token);
                if (data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
                document.getElementById('jwtToken').value = data.token;
                console.log("Tokens refreshed silently");
            } else {
                console.error("Silent refresh failed");
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                checkAuth();
            }
        } catch (err) {
            console.error("Refresh network error", err);
        }
    }

    // Run on load
    if (checkAuth()) {
        fetchTodos();
        // Periodically refresh tokens (e.g. every 10 mins)
        setInterval(silentRefresh, 10 * 60 * 1000);
    }

    function getHeaders() {
        const headers = { 'Content-Type': 'application/json' };
        const token = localStorage.getItem('access_token');
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        return headers;
    }

    function showStatus(message, isError = false) {
        const alert = document.getElementById('statusAlert');
        alert.className = `status ${isError ? 'error' : 'success'}`;
        alert.textContent = message;
    }

    async function fetchTodos() {
        const url = document.getElementById('apiUrl').value.trim();
        const list = document.getElementById('todoList');
        list.innerHTML = '<li>Loading...</li>';
        
        try {
            const res = await fetch(url, { headers: getHeaders() });
            
            if (res.status === 401) {
                showStatus("Session expired. Redirecting...", true);
                localStorage.removeItem('access_token');
                checkAuth();
                return;
            }

            if (!res.ok) {
                const text = await res.text();
                showStatus(`Failed (${res.status}): ${text}`, true);
                list.innerHTML = '<li>Failed to load.</li>';
                return;
            }
            
            const todos = await res.json();
            showStatus('Fetched successfully! Control Plane Allowed Action.', false);
            
            if (!todos || todos.length === 0) {
                list.innerHTML = '<li style="color: #8b949e; justify-content: center;">No tasks found.</li>';
                return;
            }
            
            list.innerHTML = todos.map(t => 
                `<li>
                    <span>${t.title}</span>
                    <span style="font-size: 0.8rem; color: var(--accent);">${new Date(t.created_at).toLocaleTimeString()}</span>
                </li>`
            ).join('');
        } catch (err) {
            showStatus(`Network Error: ${err.message}`, true);
            list.innerHTML = '<li>Network error.</li>';
        }
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = document.getElementById('apiUrl').value.trim();
        const title = document.getElementById('todoTitle').value.trim();
        
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ title })
            });
            
            if (res.status === 401) {
                localStorage.removeItem('access_token');
                checkAuth();
                return;
            }

            if (!res.ok) {
                const text = await res.text();
                showStatus(`Failed (${res.status}): ${text}`, true);
                return;
            }
            
            document.getElementById('todoTitle').value = '';
            showStatus('Todo added successfully! Control Plane Allowed Action.', false);
            fetchTodos();
        } catch (err) {
            showStatus(`Network Error: ${err.message}`, true);
        }
    });
</script>

</body>
</html>
