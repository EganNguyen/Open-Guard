version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: openguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: openguard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      retries: 5

  mongo-primary:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  mongo-secondary-1:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  mongo-secondary-2:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  mongo-init:
    image: mongo:6.0
    depends_on:
      mongo-primary:
        condition: service_healthy
      mongo-secondary-1:
        condition: service_healthy
      mongo-secondary-2:
        condition: service_healthy
    command: >
      bash -c "
      until mongosh --host mongo-primary:27017 --eval 'print(\"waited for connection\")';
      do
        sleep 2;
      done;
      mongosh --host mongo-primary:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo-primary:27017\"}, {_id: 1, host: \"mongo-secondary-1:27018\"}, {_id: 2, host: \"mongo-secondary-2:27019\"}]})';
      "

  clickhouse:
    image: clickhouse/clickhouse-server:23.3-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.45
    ports:
      - "16686:16686"
      - "4317:4317"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269"]
      interval: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.44.0
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.1
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ../monitoring/dashboards:/etc/grafana/provisioning/dashboards


    ports:
      - "3010:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      retries: 5

  loki:
    image: grafana/loki:2.8.2
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.8.2
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki: { condition: service_healthy }

  gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certs:/certs:ro
    depends_on:
      iam: { condition: service_healthy }
      policy: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      retries: 5

  # --- Application Services ---
  # We use minimal Go templates that report HTTP 200 on /health
  # In a real environment, they are built via Dockerfiles
  control-plane:
    build:
      context: ../../
      dockerfile: services/control-plane/Dockerfile
    ports: ["8081:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../certs:/certs:ro

  iam:
    build:
      context: ../../
      dockerfile: services/iam/Dockerfile
    ports: ["8082:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../certs:/certs:ro
    environment:
      - DATABASE_URL=postgres://openguard:openguard@postgres:5432/openguard?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - SEED_DB=true

  policy:
    build:
      context: ../../
      dockerfile: services/policy/Dockerfile
    ports: ["8083:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../certs:/certs:ro
    environment:
      - PORT=8080
      - POLICY_DATABASE_URL=postgres://openguard:openguard@postgres:5432/openguard?sslmode=disable
      - REDIS_URL=redis://redis:6379/1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092

  threat:
    build:
      context: ../../
      dockerfile: services/threat/Dockerfile
    ports: ["8084:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5

  audit:
    build:
      context: ../../
      dockerfile: services/audit/Dockerfile
    ports: ["8085:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5
    depends_on:
      mongo-primary: { condition: service_healthy }
    volumes:
      - ../certs:/certs:ro
    environment:
      - KAFKA_BROKERS=kafka:9092
      - MONGODB_URI=mongodb://mongo-primary:27017

  alerting:
    build:
      context: ../../
      dockerfile: services/alerting/Dockerfile
    ports: ["8086:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5

  webhook-delivery:
    build:
      context: ../../
      dockerfile: services/webhook-delivery/Dockerfile
    ports: ["8087:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5

  compliance:
    build:
      context: ../../
      dockerfile: services/compliance/Dockerfile
    ports: ["8088:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5
  task-backend:
    build:
      context: ../../
      dockerfile: examples/task-management-app/backend/Dockerfile
    environment:
      - DATABASE_URL=postgres://openguard:openguard@postgres:5432/openguard?sslmode=disable
      - PORT=3005
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  dlp:
    build:
      context: ../../
      dockerfile: services/dlp/Dockerfile
    ports: ["8089:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5

  connector-registry:
    build:
      context: ../../
      dockerfile: services/connector-registry/Dockerfile
    ports: ["8090:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      retries: 5

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
