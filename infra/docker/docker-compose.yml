# Removed obsolete version attribute


services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: openguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: openguard
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      kafka: { condition: service_healthy }
    command: >
      bash -c "
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic auth.events --partitions 12 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic policy.changes --partitions 6 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic data.access --partitions 24 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic threat.alerts --partitions 12 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit.trail --partitions 24 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notifications.outbound --partitions 6 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic saga.orchestration --partitions 12 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic outbox.dlq --partitions 3 --replication-factor 1 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic connector.events --partitions 24 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic webhook.delivery --partitions 12 --replication-factor 1 --config compression.type=lz4 &&
        /usr/bin/kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic webhook.dlq --partitions 3 --replication-factor 1
      "
    restart: on-failure

  mongo-primary:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  mongo-secondary-1:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  mongo-secondary-2:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27019", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5

  mongo-init:
    image: mongo:6.0
    depends_on:
      mongo-primary:
        condition: service_healthy
      mongo-secondary-1:
        condition: service_healthy
      mongo-secondary-2:
        condition: service_healthy
    command: >
      bash -c "
      until mongosh --host mongo-primary:27017 --eval 'print(\"waited for connection\")';
      do
        sleep 2;
      done;
      mongosh --host mongo-primary:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo-primary:27017\"}, {_id: 1, host: \"mongo-secondary-1:27018\"}, {_id: 2, host: \"mongo-secondary-2:27019\"}]})';
      "

  clickhouse:
    image: clickhouse/clickhouse-server:23.3-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,secretsmanager
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "./localstack-init:/etc/localstack/init/ready.d"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.45
    ports:
      - "16686:16686"
      - "4317:4317"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:14269"]
      interval: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.44.0
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.1
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ../monitoring/dashboards:/etc/grafana/provisioning/dashboards


    ports:
      - "3010:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 5s
      retries: 5

  loki:
    image: grafana/loki:2.8.2
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.8.2
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki: { condition: service_healthy }

  gateway:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certs:/certs:ro
    depends_on:
      iam: { condition: service_healthy }
      policy: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 5s
      retries: 5

  # --- Application Services ---
  # We use minimal Go templates that report HTTP 200 on /health
  # In a real environment, they are built via Dockerfiles
  control-plane:
    build:
      context: ../../
      dockerfile: services/control-plane/Dockerfile
    ports: ["8081:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../certs:/certs:ro

  iam:
    build:
      context: ../../
      dockerfile: services/iam/Dockerfile
    ports: ["8082:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5
    volumes:
      - ../certs:/certs:ro
    environment:
      - DATABASE_URL=${IAM_DATABASE_URL:?IAM_DATABASE_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - USE_AWS_SECRETS_MANAGER=true
      - AWS_SECRETSMANAGER_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SEED_DB=true
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      localstack: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  policy:
    build:
      context: ../../
      dockerfile: services/policy/Dockerfile
    ports: ["8083:8080"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5
    volumes:
      - ../certs:/certs:ro
    environment:
      - PORT=8080
      - POLICY_DATABASE_URL=${POLICY_DATABASE_URL:?POLICY_DATABASE_URL is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - USE_AWS_SECRETS_MANAGER=true
      - AWS_SECRETSMANAGER_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      localstack: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  threat:
    build:
      context: ../../
      dockerfile: services/threat/Dockerfile
    ports: ["8084:8080"]
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_GROUP_ID=threat-detector
      - KAFKA_TOPIC_AUTH=auth.events
      - KAFKA_TOPIC_POLICY=policy.changes
      - KAFKA_TOPIC_ACCESS=data.access
      - MONGO_URI=mongodb://mongo-primary:27017
      - GEOLITE2_DB_PATH=/data/GeoLite2-City.mmdb
      - THREAT_GEO_CHANGE_THRESHOLD_KM=${THREAT_GEO_CHANGE_THRESHOLD_KM:-500}
      - THREAT_OFF_HOURS_START=${THREAT_OFF_HOURS_START:-22}
      - THREAT_OFF_HOURS_END=${THREAT_OFF_HOURS_END:-6}
      - THREAT_MAX_FAILED_LOGINS=${THREAT_MAX_FAILED_LOGINS:-11}
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
      mongo-primary: { condition: service_healthy }
    volumes:
      - ../../data/GeoLite2-City.mmdb:/data/GeoLite2-City.mmdb:ro
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5

  audit:
    build:
      context: ../../
      dockerfile: services/audit/Dockerfile
    ports: ["8085:8080"]
    volumes:
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - MONGODB_URI=mongodb://mongo-primary:27017
      - AUDIT_SECRET_KEY=${AUDIT_SECRET_KEY:?AUDIT_SECRET_KEY is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - USE_AWS_SECRETS_MANAGER=true
      - AWS_SECRETSMANAGER_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    depends_on:
      mongo-primary: { condition: service_healthy }
      redis: { condition: service_healthy }
      localstack: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  alerting:
    build:
      context: ../../
      dockerfile: services/alerting/Dockerfile
    ports: ["8086:8080"]
    environment:
      - MONGO_URI=mongodb://mongo-primary:27017
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - USE_AWS_SECRETS_MANAGER=true
      - AWS_SECRETSMANAGER_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
    depends_on:
      mongo-primary: { condition: service_healthy }
      redis: { condition: service_healthy }
      localstack: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5
    volumes:
      - ../certs:/certs:ro

  webhook-delivery:
    build:
      context: ../../
      dockerfile: services/webhook-delivery/Dockerfile
    ports: ["8087:8080"]
    depends_on:
      kafka-init: { condition: service_completed_successfully }
    volumes:
      - ../certs:/certs:ro
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5

  compliance:
    build:
      context: ../../
      dockerfile: services/compliance/Dockerfile
    ports: ["8088:8080"]
    environment:
      - CLICKHOUSE_ADDR=clickhouse:9000
      - DATABASE_URL=postgres://openguard:openguard@postgres:5432/openguard?sslmode=disable
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - JWT_KEYS=${JWT_KEYS:?JWT_KEYS is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - S3_ENDPOINT=http://localstack:4566
      - S3_ACCESS_KEY=test
      - S3_SECRET_KEY=test
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      - S3_BUCKET=compliance-reports
    depends_on:
      clickhouse: { condition: service_healthy }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      localstack: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    volumes:
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5
  task-backend:
    build:
      context: ../../
      dockerfile: examples/task-management-app/backend/Dockerfile
    environment:
      - DATABASE_URL=postgres://openguard:change-me-in-production@postgres:5432/openguard?sslmode=disable
      - PORT=3005
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  task-frontend:
    build:
      context: ../../examples/task-management-app
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3005
      - OPENGUARD_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      task-backend: { condition: service_started }

  dlp:
    build:
      context: ../../
      dockerfile: services/dlp/Dockerfile
    ports: ["8089:8080"]
    environment:
      - DATABASE_URL=${DLP_DATABASE_URL:?DLP_DATABASE_URL is required}
      - JWT_KEYS=${JWT_KEYS:?JWT_KEYS is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    volumes:
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5

  connector-registry:
    build:
      context: ../../
      dockerfile: services/connector-registry/Dockerfile
    ports: ["8090:8080"]
    environment:
      - DATABASE_URL=${REGISTRY_DATABASE_URL:?REGISTRY_DATABASE_URL is required}
      - KAFKA_BROKERS=${KAFKA_BROKERS:?KAFKA_BROKERS is required}
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    volumes:
      - ../certs:/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8080/health"]
      interval: 5s
      retries: 5

  dashboard:
    build:
      context: ../../web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80"]
      interval: 10s
      retries: 5

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
