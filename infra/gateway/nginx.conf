worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;

    # Use Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    upstream iam_service {
        server iam:8080;
    }

    upstream policy_service {
        server policy:8080;
    }

    server {
        listen 8080;

        location /health {
            return 200 'gateway is healthy';
        }

        # Security Headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss:;" always;

        # Global CORS Configuration
        set $cors_origin 'http://localhost:4200';
        set $cors_credentials 'true';

        location /auth {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;

            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://iam:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /mgmt {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;

            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://iam:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /v1/policy/evaluate {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;

            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://policy:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health Proxies for Overview Dashboard
        location /health/iam {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://iam:8080/health;
        }

        location /health/policy {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://policy:8080/health;
        }

        location /v1/events {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://audit:8080;
        }

        location /health/audit {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://audit:8080/health;
        }

        location /health/control-plane {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' $cors_credentials always;
            proxy_ssl_certificate /certs/gateway.crt;
            proxy_ssl_certificate_key /certs/gateway.key;
            proxy_ssl_trusted_certificate /certs/ca.crt;
            proxy_ssl_verify on;
            proxy_pass https://control-plane:8080/health;
        }
    }
}
