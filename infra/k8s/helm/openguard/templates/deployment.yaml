{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
{{- $values := mustMerge (deepCopy $service) $.Values.defaults }}
{{- $context := dict "Values" $values "Chart" $.Chart "Release" $.Release "Template" $.Template }}
{{- $_ := set $context.Values "serviceName" $name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openguard.serviceFullname" $context }}
  labels:
    {{- include "openguard.labels" $context | nindent 4 }}
spec:
  replicas: {{ $values.replicaCount }}
  selector:
    matchLabels:
      {{- include "openguard.selectorLabels" $context | nindent 6 }}
  strategy:
    type: {{ $values.deployment.strategy.type }}
    {{- if eq $values.deployment.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- end }}
  minReadySeconds: {{ $values.deployment.minReadySeconds }}
  template:
    metadata:
      labels:
        {{- include "openguard.selectorLabels" $context | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $values.service.metricsPort | quote }}
    spec:
      serviceAccountName: {{ include "openguard.serviceFullname" $context }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: {{ $name }}
          image: "{{ $values.image.repository }}:{{ $values.image.tag }}"
          imagePullPolicy: {{ $values.image.pullPolicy }}
          ports:
            - containerPort: {{ $values.service.port }}
              name: http
            - containerPort: {{ $values.service.metricsPort }}
              name: metrics
          envFrom:
            - configMapRef:
                name: {{ include "openguard.serviceFullname" $context }}-config
            - secretRef:
                name: {{ include "openguard.serviceFullname" $context }}-secret
          resources:
            {{- toYaml $values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if $values.mtls.enabled }}
          volumeMounts:
            - name: mtls-certs
              mountPath: /etc/openguard/certs
              readOnly: true
            - name: mtls-ca
              mountPath: /etc/openguard/ca
              readOnly: true
          {{- end }}
      {{- if $values.mtls.enabled }}
      volumes:
        - name: mtls-certs
          secret:
            secretName: {{ printf "%s-mtls-cert" (include "openguard.serviceFullname" $context) }}
        - name: mtls-ca
          secret:
            secretName: {{ $values.mtls.caSecretName }}
      {{- end }}
      affinity:
        {{- toYaml $.Values.affinity | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "openguard.selectorLabels" $context | nindent 14 }}
{{- end }}
{{- end }}
