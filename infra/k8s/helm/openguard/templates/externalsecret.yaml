{{- if .Values.externalSecrets.enabled }}
{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
{{- $values := mustMerge (deepCopy $service) $.Values.defaults }}
{{- $context := dict "Values" $values "Chart" $.Chart "Release" $.Release "Template" $.Template }}
{{- $_ := set $context.Values "serviceName" $name }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "openguard.serviceFullname" $context }}-secret
  labels:
    {{- include "openguard.labels" $context | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "openguard.serviceFullname" $context }}-secret
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: openguard/{{ $.Values.global.environment }}/{{ $name }}/database-url
    - secretKey: JWT_KEYS
      remoteRef:
        key: openguard/{{ $.Values.global.environment }}/shared/jwt-keys
    {{- if eq $name "iam" }}
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: openguard/{{ $.Values.global.environment }}/iam/redis-password
    {{- end }}
    {{- if eq $name "compliance" }}
    - secretKey: COMPLIANCE_SIGNING_KEY_ARN
      remoteRef:
        key: openguard/{{ $.Values.global.environment }}/compliance/signing-key-arn
    {{- end }}
{{- end }}
{{- end }}
{{- else }}
{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
{{- $values := mustMerge (deepCopy $service) $.Values.defaults }}
{{- $context := dict "Values" $values "Chart" $.Chart "Release" $.Release "Template" $.Template }}
{{- $_ := set $context.Values "serviceName" $name }}
---
# Placeholder secret for operators not using ExternalSecrets
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openguard.serviceFullname" $context }}-secret
  labels:
    {{- include "openguard.labels" $context | nindent 4 }}
type: Opaque
data:
  # Operators must provide: DATABASE_URL, JWT_KEYS, etc.
  DATABASE_URL: ""
  JWT_KEYS: ""
{{- end }}
{{- end }}
{{- end }}
