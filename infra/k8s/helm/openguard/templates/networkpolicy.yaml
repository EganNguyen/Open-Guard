{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openguard.fullname" . }}-default
  labels:
    {{- include "openguard.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "openguard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from within the namespace for health checks and internal communication
    - from:
        - podSelector:
            matchLabels:
              {{- include "openguard.selectorLabels" . | nindent 14 }}
    # Allow traffic from ingress controller (e.g., nginx)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
{{- end }}
