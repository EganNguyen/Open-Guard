groups:
  - name: openguard-canonical-alerts
    rules:
      - alert: OutboxLagHigh
        expr: openguard_outbox_pending_records > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Transactional Outbox lag high"
          description: "Outbox relay has > 1000 pending records for 2 minutes"

      - alert: CircuitBreakerOpen
        expr: openguard_circuit_breaker_state{state="2"} == 1
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker is OPEN"
          description: "Service {{ $labels.job }} circuit breaker {{ $labels.name }} is OPEN"

      - alert: KafkaConsumerLagHigh
        expr: openguard_kafka_consumer_lag > 50000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag high"
          description: "Kafka consumer group {{ $labels.group }} lag > 50000 for 5 minutes"

      - alert: AuditChainIntegrityFailure
        expr: openguard_audit_chain_integrity_failures_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Audit chain integrity failure"
          description: "Hash chain verification failed for org {{ $labels.org_id }}"

      - alert: PolicyServiceDown
        expr: up{job="policy-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Policy service is down"

      - alert: KafkaOffsetCommitLag
        expr: histogram_quantile(0.99, rate(openguard_kafka_offset_commit_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Kafka offset commit latency high"
          description: "p99 offset commit duration > 500ms"

