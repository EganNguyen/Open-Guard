apiVersion: 1

datasources:
  - name: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeout: 30
  - name: loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki-ds
    jsonData:
      timeout: 30
