services:
  # ─────────── Backend Services ───────────
  iam:
    build:
      context: ../
      dockerfile: services/iam/Dockerfile
    container_name: openguard-iam
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-openguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-openguard}
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      IAM_JWT_KEYS_JSON: '[{"kid":"default","secret":"change-me-to-a-secure-32-byte-key!","algorithm":"HS256","status":"active"}]'
      IAM_MFA_ENCRYPTION_KEYS_JSON: '[{"id":"v1","secret":"Y2hhbmdlLW1lLXRvLWEtc2VjdXJlLTMyLWJ5dGUta2V5IQ==","status":"active"}]'
      APP_ENV: ${APP_ENV:-development}
      TLS_CERT_PATH: /app/certs/server.crt

      TLS_KEY_PATH: /app/certs/server.key
      CA_CERT_PATH: /app/certs/ca.crt
    ports:
      - "8081:8081"
    volumes:
      - ../infra/certs/ca.crt:/app/certs/ca.crt:ro
      - ../infra/certs/iam.crt:/app/certs/server.crt:ro
      - ../infra/certs/iam.key:/app/certs/server.key:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  controlplane:
    build:
      context: ../
      dockerfile: services/controlplane/Dockerfile
    container_name: openguard-controlplane
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-openguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-openguard}
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      CA_CERT_PATH: /app/certs/ca.crt
      IAM_TARGET: https://iam:8081
      POLICY_TARGET: http://policy:8082
      AUDIT_TARGET: http://audit:8083
      LOG_LEVEL: debug
      CONTROLPLANE_JWT_KEYS_JSON: '[{"kid":"default","secret":"change-me-to-a-secure-32-byte-key!","algorithm":"HS256","status":"active"}]'
      APP_ENV: ${APP_ENV:-development}
      TLS_CERT_PATH: /app/certs/server.crt
      TLS_KEY_PATH: /app/certs/server.key
    ports:
      - "8080:8080"
    volumes:
      - ../infra/certs/ca.crt:/app/certs/ca.crt:ro
      - ../infra/certs/controlplane.crt:/app/certs/server.crt:ro
      - ../infra/certs/controlplane.key:/app/certs/server.key:ro
    depends_on:
      iam:
        condition: service_started
      policy:
        condition: service_started
      audit:
        condition: service_started
      redis:
        condition: service_healthy

  policy:
    build:
      context: ../
      dockerfile: services/policy/Dockerfile
    container_name: openguard-policy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-openguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-openguard}
      KAFKA_BROKERS: kafka:9092
      REDIS_ADDR: redis:6379
      POLICY_PORT: "8082"
      POLICY_CACHE_TTL_SECONDS: "30"
      APP_ENV: ${APP_ENV:-development}
      TLS_CERT_PATH: /app/certs/server.crt
      TLS_KEY_PATH: /app/certs/server.key
      CA_CERT_PATH: /app/certs/ca.crt
    ports:
      - "8082:8082"
    volumes:
      - ../infra/certs/ca.crt:/app/certs/ca.crt:ro
      - ../infra/certs/policy.crt:/app/certs/server.crt:ro
      - ../infra/certs/policy.key:/app/certs/server.key:ro
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────── Audit Service ───────────
  audit:
    build:
      context: ../
      dockerfile: services/audit/Dockerfile
    container_name: openguard-audit
    environment:
      AUDIT_PORT: "8083"
      KAFKA_BROKERS: kafka:9092
      MONGO_URI_PRIMARY: mongodb://mongodb:27017
      MONGO_URI_SECONDARY: mongodb://mongodb:27017
      AUDIT_HASH_CHAIN_SECRET: change-me-audit-hash-secret
      AUDIT_BULK_INSERT_MAX_DOCS: "100"
      AUDIT_BULK_INSERT_FLUSH_MS: "500"
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: debug
    ports:
      - "8085:8083"
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────── Frontend ───────────
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: openguard-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      controlplane:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  mongo_data:
  clickhouse_data:
