server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /v1 to the Control Plane
    # Using a variable ($upstream) forces Nginx to perform DNS lookup at request time
    # This prevents crash if the backend is not ready when Nginx starts.
    location /v1/ {
        set $upstream openguard-control-plane:8080;
        proxy_pass https://$upstream;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE Support
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_no_cache 1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 24h;

        proxy_ssl_verify off;
    }
}
