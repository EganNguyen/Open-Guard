server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Explicitly include mime types and ensure JS/MJS are correct
    include /etc/nginx/mime.types;
    types {
        application/javascript js mjs;
    }
    default_type application/octet-stream;

    # Debug header to verify this config is active
    add_header X-Config-Version "OpenGuard-v3" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' wss:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets handling: Avoid fallback to index.html for missing assets
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Use Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Proxy API requests to the gateway
    location ~ ^/(auth|v1|mgmt|audit)/ {
        set $upstream_gateway gateway;
        proxy_pass http://$upstream_gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
