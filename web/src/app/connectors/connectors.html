<div class="p-8 font-sans">
  <header class="flex justify-between items-center mb-8">
    <div>
      <h1 class="m-0 text-2xl font-bold">Connected Apps</h1>
      <p class="text-gray-600 mt-1">Manage integrations and API access for your organization.</p>
    </div>
    <button class="bg-black text-white px-5 py-2.5 rounded-md border-none cursor-pointer font-semibold hover:bg-gray-800 transition-colors">
      Register App
    </button>
  </header>

  <div class="border border-gray-200 rounded-lg overflow-hidden">
    <table class="w-full border-collapse text-left">
      <thead>
        <tr class="bg-gray-50 border-bottom border-gray-200">
          <th class="p-4 font-medium text-gray-700">App Name</th>
          <th class="p-4 font-medium text-gray-700">Status</th>
          <th class="p-4 font-medium text-gray-700">Scopes</th>
          <th class="p-4 font-medium text-gray-700">Created Date</th>
          <th class="p-4 font-medium text-gray-700">Event Volume (30d)</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let connector of connectors" class="border-b border-gray-200 hover:bg-gray-50 transition-colors">
          <td class="p-4 font-medium">{{ connector.name }}</td>
          <td class="p-4">
            <span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs font-semibold">{{ connector.status }}</span>
          </td>
          <td class="p-4">
            <span *ngFor="let scope of connector.scopes" class="bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs mr-1">{{ scope }}</span>
          </td>
          <td class="p-4 text-gray-600">{{ connector.createdDate }}</td>
          <td class="p-4">
            <div class="flex items-center gap-2">
              <span>{{ connector.eventVolume }}</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
